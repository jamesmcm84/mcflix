<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McFlix</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--card:#16161f;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --gold:#e8b84b;--gold2:#f5d07a;--red:#e8354b;--green:#2ecc71;--purple:#8a5af0;
  --text:#f0f0f5;--muted:#888899;--light:#ccccdd;--plex:#e5a00d;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* SCREENS */
.screen{display:none;min-height:100vh}
.screen.active{display:block}
#login-screen.active{display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#1a1020,#0a0a0f);padding:20px}

/* LOGIN */
.login-box{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:36px 32px;display:flex;flex-direction:column;align-items:center}
.login-logo{font-family:'Bebas Neue',cursive;font-size:48px;letter-spacing:4px;color:var(--gold);margin-bottom:4px}
.login-logo span{color:#fff}
.login-sub{font-size:11px;color:var(--muted);margin-bottom:28px;letter-spacing:1px;text-transform:uppercase}
.login-section-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;align-self:flex-start;margin-bottom:8px;width:100%}
.user-chips{display:flex;flex-direction:column;gap:8px;width:100%;margin-bottom:16px}
.user-chip{display:flex;align-items:center;gap:10px;background:var(--bg3);border:2px solid transparent;border-radius:10px;padding:10px 14px;cursor:pointer;transition:all .2s}
.user-chip:hover{border-color:var(--border2)}
.user-chip.selected{border-color:var(--gold)}
.chip-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.chip-name{font-size:13px;font-weight:600}
.chip-role{font-size:11px;color:var(--muted)}
.divider{width:100%;display:flex;align-items:center;gap:10px;margin:4px 0 14px}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;outline:none;transition:border .2s;margin-bottom:14px;text-align:center;letter-spacing:2px}
.login-input::placeholder{color:var(--muted);letter-spacing:0}
.login-input:focus{border-color:var(--gold)}
.login-btn{width:100%;padding:13px;border:none;border-radius:10px;background:var(--gold);color:#000;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.login-btn:hover{background:var(--gold2)}
.login-error{font-size:13px;color:var(--red);text-align:center;min-height:18px}
.first-run{background:rgba(232,184,75,.08);border:1px solid rgba(232,184,75,.2);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--gold);margin-bottom:16px;width:100%;text-align:center;line-height:1.5}

/* APP HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);background:rgba(10,10,15,.97);position:sticky;top:0;z-index:100;gap:12px;flex-wrap:wrap}
.logo{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:3px;color:var(--gold)}
.logo span{color:#fff}
.nav{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px}
.nav-btn{padding:7px 13px;border:none;border-radius:7px;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.nav-btn.active{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.nav-btn:hover:not(.active){color:var(--light)}
.badge{background:var(--gold);color:#000;font-size:10px;font-weight:600;border-radius:20px;padding:1px 6px;min-width:18px;text-align:center}
.badge.red{background:var(--red);color:#fff}
.hdr-right{display:flex;align-items:center;gap:10px}
.plex-pill{display:flex;align-items:center;gap:6px;font-size:12px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:4px 10px}
.plex-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.user-pill{display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;transition:all .2s}
.user-pill:hover{border-color:var(--border2)}
.u-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px}
.u-name{font-size:12px;font-weight:600}
.role-tag{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600}
.role-admin{background:rgba(232,184,75,.15);color:var(--gold)}
.role-guest{background:rgba(138,90,240,.15);color:var(--purple)}

/* MAIN */
.main{padding:24px;max-width:1300px;margin:0 auto}
.tab{display:none}
.tab.active{display:block}

/* TOOLBAR */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.sw{flex:1;min-width:180px;position:relative}
.sw i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}
.sw input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 12px 9px 36px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:border .2s}
.sw input::placeholder{color:var(--muted)}
.sw input:focus{border-color:var(--border2)}
.fb{padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.fb.active{background:var(--bg3);border-color:var(--gold);color:var(--gold)}
.fb:hover:not(.active){color:var(--light);border-color:var(--border2)}
.ab{padding:9px 14px;border:none;border-radius:8px;background:var(--gold);color:#000;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap}
.ab:hover{background:var(--gold2)}
.sb{padding:9px 14px;border:1px solid rgba(229,160,13,.4);border-radius:8px;background:rgba(229,160,13,.1);color:var(--plex);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap}
.sb:hover{background:rgba(229,160,13,.2)}
.sb:disabled{opacity:.5;cursor:default}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center}
.stat-n{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:1px;color:var(--gold)}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.card{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;background:var(--card);border:1px solid var(--border);transition:transform .2s,border-color .2s;aspect-ratio:2/3}
.card:hover{transform:scale(1.03);border-color:var(--border2)}
.card img{width:100%;height:100%;object-fit:cover;display:block}
.pfb{width:100%;height:100%;background:linear-gradient(145deg,#1a1a2e,#16213e);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:12px;text-align:center;position:absolute;inset:0}
.pfb i{font-size:32px;color:var(--muted)}
.pfb span{font-size:11px;color:var(--light);font-weight:500;line-height:1.3}
.ov{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.92));padding:28px 10px 10px}
.ov-title{font-size:12px;font-weight:600;color:#fff;line-height:1.3;margin-bottom:4px}
.ov-meta{font-size:10px;color:var(--muted)}
.wb{position:absolute;top:8px;right:8px;background:rgba(46,204,113,.9);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.wb i{font-size:12px;color:#fff}
.tb{position:absolute;top:8px;left:8px;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.tb-m{background:rgba(232,53,75,.85);color:#fff}
.tb-tv{background:rgba(138,90,240,.85);color:#fff}
.pb{position:absolute;bottom:38px;right:6px;background:rgba(229,160,13,.9);border-radius:4px;padding:1px 5px;font-size:9px;font-weight:700;color:#000}

/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty i{font-size:48px;margin-bottom:12px;display:block}
.empty p{font-size:15px}

/* SECTION LABEL */
.sl{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:1px;margin-bottom:14px;color:var(--light);display:flex;align-items:center;gap:10px}
.sl::after{content:'';flex:1;height:1px;background:var(--border)}

/* REQUESTS */
.req-form{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
.req-form-title{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:1px;margin-bottom:16px;color:var(--gold)}
.req-list{display:flex;flex-direction:column;gap:10px}
.req-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.req-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.req-info{flex:1;min-width:120px}
.req-name{font-weight:600;font-size:14px;margin-bottom:3px}
.req-sub{font-size:12px;color:var(--muted)}
.req-status{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.st-pend{background:rgba(232,184,75,.15);color:var(--gold)}
.st-done{background:rgba(46,204,113,.15);color:var(--green)}
.req-ok{padding:6px 12px;border:1px solid rgba(46,204,113,.3);border-radius:7px;background:rgba(46,204,113,.1);color:var(--green);font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.req-ok:hover{background:rgba(46,204,113,.2)}

/* FORM ELEMENTS */
.fl{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;display:block}
.fi{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:border .2s;width:100%}
.fi::placeholder{color:var(--muted)}
.fi:focus{border-color:var(--gold)}
select.fi option{background:var(--bg2)}
textarea.fi{resize:vertical}
.fhint{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.ff{display:flex;flex-direction:column;gap:5px}
.ff.full{grid-column:1/-1}
.primary-btn{padding:10px 20px;border:none;border-radius:8px;background:var(--gold);color:#000;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s}
.primary-btn:hover{background:var(--gold2)}
.primary-btn:disabled{opacity:.5;cursor:default}
.ghost-btn{padding:9px 16px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
.ghost-btn:hover{color:var(--text);border-color:var(--text)}
.danger-btn{padding:9px 16px;border:1px solid rgba(232,53,75,.3);border-radius:8px;background:rgba(232,53,75,.1);color:var(--red);font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
.danger-btn:hover{background:rgba(232,53,75,.2)}
.plex-btn{padding:10px 20px;border:1px solid rgba(229,160,13,.3);border-radius:8px;background:rgba(229,160,13,.1);color:var(--plex);font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;width:100%}
.plex-btn:hover{background:rgba(229,160,13,.2)}
.plex-btn:disabled{opacity:.5;cursor:default}

/* MODALS */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:20px}
.mo.open{display:flex}
.md{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;position:relative}
.md::-webkit-scrollbar{width:4px}
.md::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.md-sm{max-width:520px}
.md-settings{max-width:480px}
.mc{position:absolute;top:14px;right:14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:18px;z-index:10;transition:color .2s}
.mc:hover{color:var(--text)}

/* DETAIL MODAL */
.md-hero{display:flex;gap:20px;padding:20px;border-bottom:1px solid var(--border)}
.md-poster{width:120px;height:180px;border-radius:10px;object-fit:cover;flex-shrink:0;border:1px solid var(--border)}
.md-poster-fb{width:120px;height:180px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.md-info{flex:1;min-width:0}
.md-title{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:1px;line-height:1.1;margin-bottom:6px}
.md-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border)}
.t-year{color:var(--muted)}
.t-genre{background:var(--bg3);color:var(--light)}
.t-rat{background:rgba(232,184,75,.1);color:var(--gold);border-color:rgba(232,184,75,.3)}
.t-mov{background:rgba(232,53,75,.1);color:#f07080;border-color:rgba(232,53,75,.3)}
.t-tv{background:rgba(138,90,240,.1);color:#b080f0;border-color:rgba(138,90,240,.3)}
.t-plex{background:rgba(229,160,13,.15);color:var(--plex);border-color:rgba(229,160,13,.3)}
.md-plot{font-size:13px;color:var(--light);line-height:1.6;margin-bottom:14px}
.md-actions{display:flex;gap:8px;flex-wrap:wrap}
.act{padding:8px 14px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);display:flex;align-items:center;gap:6px;transition:all .2s;text-decoration:none;background:transparent;color:var(--text)}
.act-watch{background:rgba(46,204,113,.15);color:var(--green);border-color:rgba(46,204,113,.3)}
.act-watch.on{background:var(--green);color:#fff;border-color:var(--green)}
.act-imdb{background:rgba(245,197,48,.1);color:#f5c530;border-color:rgba(245,197,48,.3)}
.act-plex{background:rgba(229,160,13,.1);color:var(--plex);border-color:rgba(229,160,13,.3)}
.act-del{background:rgba(232,53,75,.1);color:var(--red);border-color:rgba(232,53,75,.3)}
.md-body{padding:16px 20px 20px}
.dr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;gap:12px}
.dr:last-child{border-bottom:none}
.dl{color:var(--muted);flex-shrink:0}
.dv{color:var(--text);font-weight:500;text-align:right}
.prog-wrap{flex:1;background:var(--bg3);border-radius:4px;height:4px;min-width:60px}
.prog-fill{height:4px;border-radius:4px;background:var(--plex)}

/* SETTINGS */
.set-title{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:1px;color:var(--gold);margin-bottom:20px;padding:20px 20px 0}
.set-body{padding:0 20px 20px}
.set-sec{margin-bottom:24px}
.set-sec-lbl{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.set-sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.connected-box{background:rgba(46,204,113,.08);border:1px solid rgba(46,204,113,.2);border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:12px;line-height:1.6}
.server-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.srv-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between}
.srv-item:hover{border-color:var(--plex)}
.srv-item.selected{border-color:var(--plex);background:rgba(229,160,13,.08)}
.srv-name{font-weight:600;font-size:13px}
.srv-meta{font-size:11px;color:var(--muted);margin-top:2px}
.srv-chk{color:var(--plex);font-size:18px;display:none}
.srv-item.selected .srv-chk{display:block}
.err-box{background:rgba(232,53,75,.1);border:1px solid rgba(232,53,75,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#f07080;margin-top:10px;display:none}
.err-box.show{display:block}

/* LOOKUP */
.lk-preview{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.lk-thumb{width:60px;height:90px;border-radius:6px;object-fit:cover;flex-shrink:0}
.lk-fb{width:60px;height:90px;border-radius:6px;background:var(--card);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.lk-status{font-size:12px;color:var(--muted);padding:6px 0}
.lk-status.err{color:var(--red)}
.lk-status.loading{color:var(--gold)}
.str{display:flex;gap:8px;align-items:flex-end}
.str .fi{flex:1}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;display:flex;align-items:center;gap:8px;pointer-events:none;max-width:300px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{background:var(--red)}

/* LOADING */
.loading{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--plex);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div><div id="loading-txt" style="color:var(--light);font-size:14px">Loading...</div></div>
<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div class="screen active" id="login-screen">
  <div class="login-box">
    <div class="login-logo">Mc<span>Flix</span></div>
    <div class="login-sub">Your Digital Library</div>
    <div class="first-run" id="first-run" style="display:none">First time? Default passwords:<br>Admin: <strong>mcflix2024</strong> &nbsp;·&nbsp; Guest: <strong>popcorn</strong></div>
    <div class="login-section-label">Who's watching?</div>
    <div class="user-chips" id="user-chips"></div>
    <div class="divider"><div class="divider-line"></div><div class="divider-text">enter password</div><div class="divider-line"></div></div>
    <input type="password" class="login-input" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()"><i class="ti ti-arrow-right"></i> Sign In</button>
    <div class="login-error" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div class="screen" id="app-screen">
  <div class="header">
    <div class="logo">Mc<span>Flix</span></div>

      <div class="empty" id="lib-empty" style="display:none"><i class="ti ti-video-off"></i><p>No titles yet.</p></div>

    <!-- WISHLIST -->
    <div class="tab" id="tab-wishlist">

<div class="mo" id="mo-add" onclick="if(event.target===this)closeMo('add')">

      <div class="ff" style="margin-bottom:10px">
        <label class="fl">Search by Title</label>
        <div class="str"><input type="text" class="fi" id="add-search" placeholder="Type title, press Search..." onkeydown="if(event.key==='Enter')doLookup()"><button class="primary-btn" id="lk-btn" onclick="doLookup()"><i class="ti ti-search"></i> Search</button></div>
      </div>

        <div class="ff full"><label class="fl">Title</label><input type="text" class="fi" id="add-t"></div>
        <div class="ff"><label class="fl">Type</label><select class="fi" id="add-type"><option value="movie">Movie</option><option value="tv">TV Show</option></select></div>

        <div class="ff"><label class="fl">Rating</label><input type="text" class="fi" id="add-rat" placeholder="PG-13, R..."></div>

        <div class="ff full"><label class="fl">Plot</label><textarea class="fi" id="add-plot" rows="2" placeholder="Description..."></textarea></div>
        <div class="ff full" id="add-watched-row" style="flex-direction:row;align-items:center;gap:10px;padding-top:4px">
          <input type="checkbox" id="add-wtch" style="width:16px;height:16px;accent-color:var(--gold)">

        </div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────────
const OMDB_KEY = 'trilogy';
const SK = 'mcflix_v6';
const PK = 'mcflix_plex';
const AK = 'mcflix_auth';

// ─── USERS ─────────────────────────────────────────────────────────────────────
const USERS = [
  { id:'james', name:'James', role:'admin', color:'#e8b84b' },
  { id:'alysa', name:'Alysa', role:'guest', color:'#8a5af0' },
  { id:'friends', name:'Friends', role:'guest', color:'#3498db' },
];

// ─── STATE ─────────────────────────────────────────────────────────────────────
let CU = null; // current user
let selUser = null;
let state = { library:[], wishlist:[], requests:[] };
let plex = { token:'', serverUrl:'', serverName:'', clientId:'' };
let libF = 'all';
let addMode = 'library';
let pposter = '', pimdb = '';
let selSrv = null, srvList = [];

// ─── HELPERS ───────────────────────────────────────────────────────────────────
const COLORS = ['#e8354b','#8a5af0','#2ecc71','#e8b84b','#3498db','#e67e22'];
function clr(n){let h=0;for(let c of n)h=(h<<5)-h+c.charCodeAt(0);return COLORS[Math.abs(h)%COLORS.length]}
function ini(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function uid(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2)}

function toast(msg,err=false){
  const t=document.getElementById('toast');
  t.className='toast'+(err?' err':'');
  t.innerHTML=`<i class="ti ti-${err?'alert-circle':'check'}"></i> ${msg}`;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000);
}
function loading(show,msg='Loading...'){
  document.getElementById('loading-txt').textContent=msg;
  document.getElementById('loading').className='loading'+(show?' show':'');
}
function openMo(id){document.getElementById('mo-'+id).classList.add('open')}
function closeMo(id){document.getElementById('mo-'+id).classList.remove('open')}

// ─── STORAGE ───────────────────────────────────────────────────────────────────
function loadAll(){
  try{const s=localStorage.getItem(SK);if(s)state=JSON.parse(s);}catch(e){}
  try{const p=localStorage.getItem(PK);if(p)plex=JSON.parse(p);}catch(e){}
}
function saveState(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}
function savePlex(){try{localStorage.setItem(PK,JSON.stringify(plex));}catch(e){}}
function loadAuth(){try{return JSON.parse(localStorage.getItem(AK))||{};}catch(e){return{}}}
function saveAuth(d){localStorage.setItem(AK,JSON.stringify(d))}

// ─── PASSWORDS ─────────────────────────────────────────────────────────────────
function hash(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return(h>>>0).toString(36)}
function getPW(){
  const a=loadAuth();
  return{admin:a.adminHash||hash('mcflix2024'),guest:a.guestHash||hash('popcorn'),firstRun:!a.adminHash};
}

// ─── SEED DATA ─────────────────────────────────────────────────────────────────
function seed(){
  state={
    library:[
      {id:'s1',title:'Interstellar',type:'movie',year:'2014',genre:'Sci-Fi, Adventure',rating:'PG-13',plot:"A team of explorers travel through a wormhole in space in an attempt to ensure humanity's survival.",imdb:'tt0816692',poster:'https://m.media-amazon.com/images/M/MV5BZjdkOTU3MDktN2IxOS00OGEyLWFmMjktY2FiMmZkNWIyODZiXkEyXkFqcGdeQXVyMTMxODk2OTU@._V1_SX300.jpg',format:'Plex',watched:true,plexSource:false},
      {id:'s2',title:'Oppenheimer',type:'movie',year:'2023',genre:'Biography, Drama',rating:'R',plot:'The story of J. Robert Oppenheimer and his role in the development of the atomic bomb.',imdb:'tt15398776',poster:'https://m.media-amazon.com/images/M/MV5BMDBmYTZjNjUtN2M1MS00MTQ2LTk2ODgtNzc2M2QyZGE5NTVjXkEyXkFqcGdeQXVyNzAwMjU2MTY@._V1_SX300.jpg',format:'Blu-ray',watched:false,plexSource:false},
      {id:'s3',title:'The Dark Knight',type:'movie',year:'2008',genre:'Action, Crime',rating:'PG-13',plot:'Batman raises the stakes in his war on crime as the Joker wreaks havoc on Gotham City.',imdb:'tt0468569',poster:'https://m.media-amazon.com/images/M/MV5BMTMxNTMwODM0NF5BMl5BanBnXkFtZTcwODAyMTk2Mw@@._V1_SX300.jpg',format:'USB Drive',watched:true,plexSource:false},
      {id:'s4',title:'Breaking Bad',type:'tv',year:'2008',genre:'Crime, Drama',rating:'TV-MA',plot:'A chemistry teacher diagnosed with cancer turns to manufacturing methamphetamine.',imdb:'tt0903747',poster:'https://m.media-amazon.com/images/M/MV5BYmQ4YWMxYjUtNjZmYi00MDdmLWJjOTUtYjc3NzgwYTZiMWMxXkEyXkFqcGdeQXVyMTMzNDExODE5._V1_SX300.jpg',format:'Plex',watched:true,plexSource:false},
      {id:'s5',title:'Dune: Part Two',type:'movie',year:'2024',genre:'Sci-Fi, Adventure',rating:'PG-13',plot:'Paul Atreides unites with Chani and the Fremen on a warpath of revenge.',imdb:'tt15239678',poster:'https://m.media-amazon.com/images/M/MV5BN2QyZGU4ZDctOWMzMy00NTc5LThlOGQtODhmNDBiNTIwYWQ3XkEyXkFqcGdeQXVyMDM2NDM2MQ@@._V1_SX300.jpg',format:'Plex',watched:true,plexSource:false},
      {id:'s6',title:'Stranger Things',type:'tv',year:'2016',genre:'Drama, Horror',rating:'TV-14',plot:'When a boy disappears, his friends uncover a secret experiment and terrifying supernatural forces.',imdb:'tt4574334',poster:'https://m.media-amazon.com/images/M/MV5BN2ZmYjg1YmItNWQ4OC00YWM0LWE0ZDktYTdiOTE5ZjRjYWUxXkEyXkFqcGdeQXVyNjgxNTQ3Mjk@._V1_SX300.jpg',format:'Plex',watched:false,plexSource:false},
    ],
    wishlist:[
      {id:'w1',title:'Killers of the Flower Moon',type:'movie',year:'2023',genre:'Crime, Drama',rating:'R',plot:'Members of the Osage Nation are murdered under mysterious circumstances.',imdb:'tt5537002',poster:'https://m.media-amazon.com/images/M/MV5BNjU3NjcxNTA1MV5BMl5BanBnXkFtZTcwNzEzOTkzMg@@._V1_SX300.jpg',format:'',watched:false,plexSource:false},
      {id:'w2',title:'Shogun',type:'tv',year:'2024',genre:'Drama, History',rating:'TV-MA',plot:'A 17th century English sailor becomes embroiled in the world of feudal Japan.',imdb:'tt2788316',poster:'https://m.media-amazon.com/images/M/MV5BOGI2NDljMDItNjM0OS00ZTk2LTg2YzEtOGI5NjA1NTMwMzM4XkEyXkFqcGdeQXVyMTkxNjUyNQ@@._V1_SX300.jpg',format:'',watched:false,plexSource:false},
    ],
    requests:[
      {id:'r1',from:'Alysa',title:'The Bear',type:'tv',note:"Everyone says it's amazing!",status:'pending',ts:Date.now()-3600000},
      {id:'r2',from:'Ryan Law',title:'Gladiator II',type:'movie',note:'Just came out',status:'pending',ts:Date.now()-7200000},
    ]
  };
  saveState();
}

// ─── LOGIN ─────────────────────────────────────────────────────────────────────
function buildLogin(){
  const pw=getPW();
  if(pw.firstRun) document.getElementById('first-run').style.display='';
  document.getElementById('user-chips').innerHTML=USERS.map(u=>`
    <div class="user-chip" id="chip-${u.id}" onclick="selU('${u.id}')">
      <div class="chip-av" style="background:${u.color}22;color:${u.color}">${u.name.slice(0,2).toUpperCase()}</div>
      <div style="flex:1"><div class="chip-name">${u.name}</div><div class="chip-role">${u.role==='admin'?'Admin':'Guest'}</div></div>
      <i class="ti ti-chevron-right" style="color:var(--muted);font-size:16px"></i>
    </div>`).join('');
  selU('james');
}

function selU(id){
  selUser=USERS.find(u=>u.id===id);
  document.querySelectorAll('.user-chip').forEach(c=>c.classList.remove('selected'));
  document.getElementById('chip-'+id).classList.add('selected');
  document.getElementById('login-pass').focus();
}

function doLogin(){
  const pass=document.getElementById('login-pass').value;
  const errEl=document.getElementById('login-err');
  if(!selUser){errEl.textContent='Select a user first.';return}
  const pw=getPW();
  const h=hash(pass);
  const ok=selUser.role==='admin'?h===pw.admin:h===pw.guest;
  if(!ok){
    errEl.textContent='Incorrect password.';
    document.getElementById('login-pass').value='';
    document.getElementById('login-pass').focus();
    return;
  }
  errEl.textContent='';
  CU={...selUser};
  // Switch screens
  document.getElementById('login-screen').className='screen';
  document.getElementById('app-screen').className='screen active';
  initApp();
}

// ─── APP INIT ─────────────────────────────────────────────────────────────────
function initApp(){
  const isAdmin=CU.role==='admin';
  // Header user info
  const av=document.getElementById('u-av');
  av.textContent=CU.name.slice(0,2).toUpperCase();
  av.style.background=CU.color+'22'; av.style.color=CU.color;
  document.getElementById('u-name').textContent=CU.name;
  const rt=document.getElementById('u-role');
  rt.textContent=isAdmin?'Admin':'Guest';
  rt.className='role-tag '+(isAdmin?'role-admin':'role-guest');
  // Admin-only buttons
  document.getElementById('add-lib-btn').style.display=isAdmin?'':'none';
  document.getElementById('add-wish-btn').style.display=isAdmin?'':'none';
  // Plex
  if(isAdmin && plex.token && plex.serverUrl){
    document.getElementById('sync-btn').style.display='';
    document.getElementById('f-plex').style.display='';
    document.getElementById('plex-pill').style.display='';
    document.getElementById('plex-pill-name').textContent=plex.serverName||'Plex';
  }
  // Pre-fill request name for guests
  if(!isAdmin) document.getElementById('rq-name').value=CU.name;
  renderLib();
  updateCounts();
}

function signOut(){
  CU=null; selUser=null;
  document.getElementById('login-pass').value='';
  document.getElementById('login-err').textContent='';
  document.getElementById('app-screen').className='screen';
  document.getElementById('login-screen').className='screen active';
  buildLogin();
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(t,el){
  document.querySelectorAll('.tab').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(t==='library')renderLib();
  if(t==='wishlist')renderWish();
  if(t==='requests')renderReq();
}
function setF(el,f){
  libF=f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); renderLib();
}
function updateCounts(){
  document.getElementById('lib-count').textContent=state.library.length;
  document.getElementById('wish-count').textContent=state.wishlist.length;
  const p=state.requests.filter(r=>r.status==='pending').length;
  const rc=document.getElementById('req-count');
  rc.textContent=p; rc.style.display=p?'':'none';
}

// ─── RENDER LIBRARY ────────────────────────────────────────────────────────────
function renderStats(){
  const t=state.library.length,w=state.library.filter(m=>m.watched).length;
  const mv=state.library.filter(m=>m.type==='movie').length,tv=state.library.filter(m=>m.type==='tv').length;
  const pl=state.library.filter(m=>m.plexSource).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-n">${t}</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n">${w}</div><div class="stat-l">Watched</div></div>
    <div class="stat"><div class="stat-n">${t-w}</div><div class="stat-l">Unwatched</div></div>
    <div class="stat"><div class="stat-n">${mv}</div><div class="stat-l">Movies</div></div>
    <div class="stat"><div class="stat-n">${tv}</div><div class="stat-l">TV Shows</div></div>
    ${pl?`<div class="stat"><div class="stat-n" style="color:var(--plex)">${pl}</div><div class="stat-l">From Plex</div></div>`:''}`;
}

function cardHTML(m,src){
  const hp=m.poster&&m.poster!=='N/A';
  return `<div class="card" onclick="openDetail('${m.id}','${src}')">
    ${hp?`<img src="${m.poster}" alt="${m.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
    <div class="pfb" style="display:${hp?'none':'flex'}"><i class="ti ti-movie"></i><span>${m.title}</span></div>
    <div class="ov"><div class="ov-title">${m.title}</div><div class="ov-meta">${m.year||''}${m.genre?' · '+m.genre.split(',')[0]:''}</div></div>
    ${m.watched?`<div class="wb"><i class="ti ti-check"></i></div>`:''}
    <div class="tb ${m.type==='movie'?'tb-m':'tb-tv'}">${m.type==='movie'?'Film':'TV'}</div>
    ${m.plexSource?`<div class="pb">PLEX</div>`:''}
  </div>`;
}

function renderLib(){
  renderStats();
  const q=(document.getElementById('s-lib').value||'').toLowerCase();
  const items=state.library.filter(m=>{
    if(q&&!m.title.toLowerCase().includes(q))return false;
    if(libF==='movie')return m.type==='movie';
    if(libF==='tv')return m.type==='tv';
    if(libF==='watched')return m.watched;
    if(libF==='unwatched')return !m.watched;
    if(libF==='plex')return m.plexSource;
    return true;
  });
  const grid=document.getElementById('lib-grid'),empty=document.getElementById('lib-empty');
  if(!items.length){grid.innerHTML='';empty.style.display='';return}
  empty.style.display='none';
  grid.innerHTML=items.map(m=>cardHTML(m,'library')).join('');
  updateCounts();
}

function renderWish(){
  const q=(document.getElementById('s-wish').value||'').toLowerCase();
  const items=state.wishlist.filter(m=>!q||m.title.toLowerCase().includes(q));
  const grid=document.getElementById('wish-grid'),empty=document.getElementById('wish-empty');
  if(!items.length){grid.innerHTML='';empty.style.display='';return}
  empty.style.display='none';
  grid.innerHTML=items.map(m=>cardHTML(m,'wishlist')).join('');
  updateCounts();
}

function renderReq(){
  const list=document.getElementById('req-list'),empty=document.getElementById('req-empty');
  const isAdmin=CU?.role==='admin';
  if(!state.requests.length){list.innerHTML='';empty.style.display='';return}
  empty.style.display='none';
  list.innerHTML=state.requests.slice().reverse().map(r=>`
    <div class="req-card">
      <div class="req-av" style="background:${clr(r.from)}22;color:${clr(r.from)}">${ini(r.from)}</div>
      <div class="req-info">
        <div class="req-name">${r.title} <span style="font-size:11px;color:var(--muted)">(${r.type==='movie'?'Movie':'TV'})</span></div>
        <div class="req-sub">By <strong>${r.from}</strong>${r.note?' · '+r.note:''}</div>
      </div>
      <div class="req-status ${r.status==='pending'?'st-pend':'st-done'}">${r.status==='pending'?'Pending':'Added ✓'}</div>
      ${isAdmin&&r.status==='pending'?`<button class="req-ok" onclick="approveReq('${r.id}')">Add to Wishlist</button>`:''}
    </div>`).join('');
  updateCounts();
}

// ─── DETAIL MODAL ──────────────────────────────────────────────────────────────
function openDetail(id,src){
  const list=src==='library'?state.library:state.wishlist;
  const m=list.find(x=>x.id===id); if(!m)return;
  const isAdmin=CU?.role==='admin';
  const hp=m.poster&&m.poster!=='N/A';
  const inLib=!!state.library.find(x=>x.id===id);
  const prog=m.duration>0?Math.round((m.viewOffset/m.duration)*100):0;
  document.getElementById('detail-body').innerHTML=`
    <div class="md-hero">
      ${hp?`<img src="${m.poster}" class="md-poster" onerror="this.style.display='none'">`:`<div class="md-poster-fb"><i class="ti ti-movie" style="font-size:36px;color:var(--muted)"></i></div>`}
      <div class="md-info">
        <div class="md-title">${m.title}</div>
        <div class="md-tags">
          ${m.year?`<span class="tag t-year">${m.year}</span>`:''}
          ${m.genre?m.genre.split(',').slice(0,2).map(g=>`<span class="tag t-genre">${g.trim()}</span>`).join(''):''}
          ${m.rating?`<span class="tag t-rat">${m.rating}</span>`:''}
          <span class="tag ${m.type==='movie'?'t-mov':'t-tv'}">${m.type==='movie'?'Movie':'TV Show'}</span>
          ${m.plexSource?`<span class="tag t-plex">Plex</span>`:''}
        </div>
        ${m.plot&&m.plot!=='N/A'?`<div class="md-plot">${m.plot}</div>`:''}
        <div class="md-actions">
          ${isAdmin&&inLib?`<button class="act act-watch ${m.watched?'on':''}" onclick="toggleWatch('${m.id}')"><i class="ti ti-${m.watched?'eye-off':'eye'}"></i> ${m.watched?'Watched':'Mark Watched'}</button>`:''}
          ${m.imdb&&m.imdb!=='N/A'?`<a href="https://www.imdb.com/title/${m.imdb}/" class="act act-imdb" target="_blank"><i class="ti ti-external-link"></i> IMDb</a>`:''}
          ${m.plexSource&&plex.serverUrl?`<a href="${plex.serverUrl.replace(/\/$/,'')}/web/index.html#!/server/${m.plexKey}/details" class="act act-plex" target="_blank"><i class="ti ti-player-play"></i> Open in Plex</a>`:''}
          ${isAdmin&&!inLib?`<button class="act act-watch" onclick="moveToLib('${m.id}')"><i class="ti ti-plus"></i> Add to Library</button>`:''}
          ${isAdmin?`<button class="act act-del" onclick="delItem('${m.id}','${src}')"><i class="ti ti-trash"></i> Remove</button>`:''}
        </div>
      </div>
    </div>
    <div class="md-body">
      ${m.format?`<div class="dr"><span class="dl">Location</span><span class="dv">${m.format}</span></div>`:''}
      ${m.imdb&&m.imdb!=='N/A'?`<div class="dr"><span class="dl">IMDb</span><span class="dv" style="color:var(--gold)">imdb.com/title/${m.imdb}</span></div>`:''}
      ${prog>0&&prog<100?`<div class="dr"><span class="dl">Progress</span><div class="prog-wrap"><div class="prog-fill" style="width:${prog}%"></div></div><span class="dv">${prog}%</span></div>`:''}
    </div>`;
  openMo('detail');
}

function toggleWatch(id){
  const m=state.library.find(x=>x.id===id);if(!m)return;
  m.watched=!m.watched; saveState(); openDetail(id,'library'); renderLib();
  toast(m.watched?'Marked as watched!':'Marked as unwatched');
}
function moveToLib(id){
  const m=state.wishlist.find(x=>x.id===id);if(!m)return;
  state.library.push({...m,id:uid(),watched:false});
  state.wishlist=state.wishlist.filter(x=>x.id!==id);
  saveState(); closeMo('detail'); renderLib(); renderWish(); updateCounts();
  toast(m.title+' added to library!');
}
function delItem(id,src){
  if(!confirm('Remove this title?'))return;
  if(src==='library')state.library=state.library.filter(x=>x.id!==id);
  else state.wishlist=state.wishlist.filter(x=>x.id!==id);
  saveState(); closeMo('detail');
  if(src==='library')renderLib();else renderWish();
  updateCounts();
}

// ─── REQUESTS ─────────────────────────────────────────────────────────────────
function approveReq(id){
  const r=state.requests.find(x=>x.id===id);if(!r)return;
  r.status='added';
  state.wishlist.push({id:uid(),title:r.title,type:r.type,year:'',genre:'',rating:'',plot:'',imdb:'',poster:'',format:'',watched:false,plexSource:false});
  saveState(); renderReq(); updateCounts(); toast(r.title+' added to wishlist');
}
function submitReq(){
  const name=document.getElementById('rq-name').value.trim();
  const title=document.getElementById('rq-title').value.trim();
  if(!name||!title){alert('Please enter your name and a title.');return}
  state.requests.push({id:uid(),from:name,title,type:document.getElementById('rq-type').value,note:document.getElementById('rq-note').value.trim(),status:'pending',ts:Date.now()});
  saveState();
  ['rq-name','rq-title','rq-note'].forEach(i=>document.getElementById(i).value='');
  renderReq(); updateCounts(); toast('Request sent!');
}

// ─── ADD MODAL ────────────────────────────────────────────────────────────────
function openAdd(target){
  addMode=target; pposter=''; pimdb='';
  document.getElementById('add-title-lbl').textContent=target==='library'?'Add to Library':'Add to Wishlist';
  document.getElementById('add-watched-row').style.display=target==='library'?'flex':'none';
  ['add-t','add-yr','add-gn','add-rat','add-fmt','add-plot','add-search'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('add-type').value='movie';
  document.getElementById('add-wtch').checked=false;
  document.getElementById('lk-result').innerHTML='';
  openMo('add');
}

async function doLookup(){
  const q=document.getElementById('add-search').value.trim();if(!q)return;
  const btn=document.getElementById('lk-btn'),res=document.getElementById('lk-result');
  btn.disabled=true;
  res.innerHTML=`<div class="lk-status loading"><i class="ti ti-loader"></i> Searching...</div>`;
  try{
    const type=document.getElementById('add-type').value==='tv'?'series':'movie';
    const r=await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&t=${encodeURIComponent(q)}&type=${type}`);
    const d=await r.json();
    if(d.Response==='True'){
      pposter=d.Poster&&d.Poster!=='N/A'?d.Poster:'';
      pimdb=d.imdbID||'';
      document.getElementById('add-t').value=d.Title||'';
      document.getElementById('add-yr').value=d.Year||'';
      document.getElementById('add-gn').value=d.Genre||'';
      document.getElementById('add-rat').value=d.Rated||'';
      document.getElementById('add-plot').value=d.Plot&&d.Plot!=='N/A'?d.Plot:'';
      const hp=d.Poster&&d.Poster!=='N/A';
      res.innerHTML=`<div class="lk-preview">
        ${hp?`<img src="${d.Poster}" class="lk-thumb" onerror="this.style.display='none'">`:`<div class="lk-fb"><i class="ti ti-movie" style="color:var(--muted);font-size:20px"></i></div>`}
        <div style="flex:1"><div style="font-weight:600;font-size:14px;margin-bottom:4px">${d.Title} (${d.Year})</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:5px">${d.Genre||''} · ${d.Rated||''} · ⭐ ${d.imdbRating||'N/A'}</div>
        <div style="font-size:12px;color:var(--light);line-height:1.5">${d.Plot&&d.Plot!=='N/A'?d.Plot.slice(0,130)+'...':''}</div></div></div>`;
    }else{
      res.innerHTML=`<div class="lk-status err"><i class="ti ti-alert-circle"></i> Not found — fill in below manually.</div>`;
    }
  }catch(e){res.innerHTML=`<div class="lk-status err">Search failed.</div>`;}
  btn.disabled=false;
}

function submitAdd(){
  const title=document.getElementById('add-t').value.trim();
  if(!title){alert('Enter a title.');return}
  const item={id:uid(),title,type:document.getElementById('add-type').value,year:document.getElementById('add-yr').value.trim(),genre:document.getElementById('add-gn').value.trim(),rating:document.getElementById('add-rat').value.trim(),imdb:pimdb,poster:pposter,plot:document.getElementById('add-plot').value.trim(),format:document.getElementById('add-fmt').value.trim(),watched:addMode==='library'&&document.getElementById('add-wtch').checked,plexSource:false};
  if(addMode==='library')state.library.push(item);else state.wishlist.push(item);
  saveState(); closeMo('add');
  if(addMode==='library')renderLib();else renderWish();
  updateCounts(); toast(title+' added!');
}

// ─── PLEX ─────────────────────────────────────────────────────────────────────
function plexH(token){return{'X-Plex-Token':token||plex.token,'X-Plex-Client-Identifier':plex.clientId||'mcflix','X-Plex-Product':'McFlix','X-Plex-Version':'1.0','Accept':'application/json'}}
async function plexGet(path,token,base){
  const url=(base||plex.serverUrl).replace(/\/$/,'')+path;
  const r=await fetch(url,{headers:plexH(token)});
  if(!r.ok)throw new Error('Plex '+r.status);
  return r.json();
}
function posterUrl(thumb){
  if(!thumb||!plex.serverUrl||!plex.token)return'';
  return`${plex.serverUrl.replace(/\/$/,'')}${thumb}?X-Plex-Token=${plex.token}`;
}
function plexToLocal(item,type){
  return{id:'plex_'+item.ratingKey,title:item.title,type,year:item.year?String(item.year):'',genre:item.Genre?item.Genre.map(g=>g.tag).join(', '):'',rating:item.contentRating||'',plot:item.summary||'',imdb:(item.Guid||[]).find(g=>g.id?.startsWith('imdb://'))?.id?.replace('imdb://','') || '',poster:posterUrl(item.thumb),format:'Plex',watched:type==='movie'?(item.viewCount>0):(item.leafCount===item.viewedLeafCount),plexKey:item.ratingKey,plexThumb:item.thumb,viewOffset:item.viewOffset||0,duration:item.duration||0,plexSource:true};
}

async function syncPlex(){
  if(!plex.token||!plex.serverUrl)return;
  const btn=document.getElementById('sync-btn');
  btn.disabled=true;btn.innerHTML='<i class="ti ti-refresh" style="animation:spin .8s linear infinite"></i> Syncing...';
  loading(true,'Syncing Plex library...');
  try{
    const libs=await plexGet('/library/sections');
    const secs=libs.MediaContainer.Directory||[];
    const items=[];
    for(const s of secs){
      if(s.type==='movie'){const d=await plexGet(`/library/sections/${s.key}/all?type=1`);(d.MediaContainer.Metadata||[]).forEach(i=>items.push(plexToLocal(i,'movie')));}
      else if(s.type==='show'){const d=await plexGet(`/library/sections/${s.key}/all?type=2`);(d.MediaContainer.Metadata||[]).forEach(i=>items.push(plexToLocal(i,'tv')));}
    }
    state.library=[...state.library.filter(m=>!m.plexSource),...items];
    saveState();renderLib();updateCounts();
    toast(`Synced ${items.length} titles from Plex!`);
  }catch(e){toast('Sync failed: '+e.message,true);}
  loading(false);
  btn.disabled=false;btn.innerHTML='<i class="ti ti-refresh"></i> Sync Plex';
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────────
function openSettings(){
  const isAdmin=CU?.role==='admin';
  let h=`<div class="set-title">Settings</div><div class="set-body">`;

  if(isAdmin){
    h+=`<div class="set-sec"><div class="set-sec-lbl">Plex</div>`;
    if(plex.token&&plex.serverUrl){
      h+=`<div class="connected-box">Connected to <strong style="color:var(--green)">${plex.serverName||plex.serverUrl}</strong><br><span style="font-size:12px;color:var(--muted)">${state.library.filter(m=>m.plexSource).length} titles synced</span></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="primary-btn" onclick="closeMo('settings');syncPlex()"><i class="ti ti-refresh"></i> Sync Now</button>
          <button class="danger-btn" onclick="disconnPlex()"><i class="ti ti-unlink"></i> Disconnect</button>
        </div>`;
    }else{
      h+=`<div class="ff" style="margin-bottom:10px"><label class="fl">Plex Token</label>
          <input type="password" class="fi" id="s-tok" placeholder="Paste your Plex token here">
          <div class="fhint">Found in any Plex network request URL as X-Plex-Token=xxxx</div></div>
          <div id="s-srv-area"></div>
          <div class="err-box" id="s-err"></div>
          <button class="plex-btn" id="s-find-btn" onclick="settingsFind()"><i class="ti ti-plug"></i> Find My Plex Servers</button>`;
    }
    h+=`</div>`;

    h+=`<div class="set-sec"><div class="set-sec-lbl">Passwords</div>
      <div class="ff" style="margin-bottom:10px"><label class="fl">Admin Password</label><input type="password" class="fi" id="s-ap" placeholder="New admin password" autocomplete="new-password"></div>
      <div class="ff" style="margin-bottom:12px"><label class="fl">Guest Password (Alysa & Friends)</label><input type="password" class="fi" id="s-gp" placeholder="New guest password" autocomplete="new-password">
        <div class="fhint">Leave blank to keep current password.</div></div>
      <button class="primary-btn" onclick="savePW()"><i class="ti ti-device-floppy"></i> Save Passwords</button>
    </div>`;
  }

  h+=`<div class="set-sec"><div class="set-sec-lbl">Account</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px">Signed in as <strong style="color:var(--text)">${CU?.name}</strong> (${CU?.role})</div>
    <button class="ghost-btn" onclick="signOut();closeMo('settings')"><i class="ti ti-logout"></i> Sign Out</button>
  </div></div>`;

  document.getElementById('settings-body').innerHTML=h;
  openMo('settings');
}

async function settingsFind(){
  const tok=document.getElementById('s-tok')?.value.trim();
  if(!tok){showErr('s-err','Enter your token first.');return}
  const btn=document.getElementById('s-find-btn'),errEl=document.getElementById('s-err');
  errEl.classList.remove('show'); btn.disabled=true;
  btn.innerHTML='<i class="ti ti-loader" style="animation:spin .8s linear infinite"></i> Finding servers...';
  try{
    const cid='mcflix-'+Math.random().toString(36).slice(2);
    const r=await fetch('https://plex.tv/api/v2/resources?includeHttps=1&includeRelay=1',{headers:{...plexH(tok),'X-Plex-Client-Identifier':cid}});
    if(!r.ok)throw new Error('Cannot reach Plex.tv');
    const data=await r.json();
    const servers=data.filter(d=>d.provides?.includes('server'));
    if(!servers.length)throw new Error('No servers found for this token.');
    srvList=servers; plex.token=tok; plex.clientId=cid;
    document.getElementById('s-srv-area').innerHTML=`
      <div class="fl" style="margin-bottom:8px">Choose your server</div>
      <div class="server-list">${servers.map((s,i)=>`
        <div class="srv-item ${i===0?'selected':''}" onclick="pickSrv(${i})" id="sv-${i}">
          <div><div class="srv-name">${s.name}</div><div class="srv-meta">${s.connections?.[0]?.address||''}</div></div>
          <i class="ti ti-check srv-chk"></i>
        </div>`).join('')}
      </div>
      <button class="plex-btn" onclick="settingsConnect()"><i class="ti ti-download"></i> Connect & Sync Library</button>`;
    selSrv=servers[0];
  }catch(e){showErr('s-err',e.message);}
  btn.disabled=false;btn.innerHTML='<i class="ti ti-plug"></i> Find My Plex Servers';
}

function pickSrv(i){
  selSrv=srvList[i];
  document.querySelectorAll('.srv-item').forEach(e=>e.classList.remove('selected'));
  document.getElementById('sv-'+i).classList.add('selected');
}

async function settingsConnect(){
  if(!selSrv)return;
  loading(true,'Connecting to Plex...');
  const conns=[...(selSrv.connections||[])].sort((a,b)=>(a.relay?1:0)-(b.relay?1:0));
  let ok=false;
  for(const c of conns){
    try{
      const url=c.uri||`${c.protocol}://${c.address}:${c.port}`;
      await plexGet('/library/sections',plex.token,url);
      plex.serverUrl=url; plex.serverName=selSrv.name; ok=true; break;
    }catch(e){continue}
  }
  if(!ok){loading(false);toast('Could not reach server',true);return}
  savePlex(); closeMo('settings');
  document.getElementById('sync-btn').style.display='';
  document.getElementById('f-plex').style.display='';
  document.getElementById('plex-pill').style.display='';
  document.getElementById('plex-pill-name').textContent=plex.serverName;
  await syncPlex(); loading(false);
}

function disconnPlex(){
  if(!confirm('Disconnect Plex? Removes all synced titles.'))return;
  plex={token:'',serverUrl:'',serverName:'',clientId:''};
  state.library=state.library.filter(m=>!m.plexSource);
  savePlex();saveState();closeMo('settings');
  document.getElementById('sync-btn').style.display='none';
  document.getElementById('f-plex').style.display='none';
  document.getElementById('plex-pill').style.display='none';
  renderLib();updateCounts();toast('Plex disconnected');
}

function savePW(){
  const ap=document.getElementById('s-ap')?.value;
  const gp=document.getElementById('s-gp')?.value;
  const a=loadAuth();
  if(ap)a.adminHash=hash(ap);
  if(gp)a.guestHash=hash(gp);
  saveAuth(a); closeMo('settings'); toast('Passwords saved!');
}

function showErr(id,msg){const e=document.getElementById(id);if(e){e.textContent=msg;e.classList.add('show')}}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadAll();
if(state.library.length===0&&!plex.token) seed();
buildLogin();
</script>
