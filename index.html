<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McFlix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24; --card: #16161f;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    --gold: #e8b84b; --gold2: #f5d07a; --red: #e8354b; --green: #2ecc71;
    --purple: #8a5af0; --text: #f0f0f5; --muted: #888899; --light: #ccccdd;
    --plex: #e5a00d;
  }
  body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; overflow-x: hidden; }

  /* HEADER */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid var(--border); background: rgba(10,10,15,0.97); position: sticky; top: 0; z-index: 100; gap: 12px; flex-wrap: wrap; }
  .logo { font-family: 'Bebas Neue', cursive; font-size: 28px; letter-spacing: 3px; color: var(--gold); flex-shrink: 0; }
  .logo span { color: #fff; }
  .nav { display: flex; gap: 4px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 4px; }
  .nav-btn { padding: 7px 14px; border: none; border-radius: 7px; background: transparent; color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .nav-btn.active { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }
  .nav-btn:hover:not(.active) { color: var(--light); }
  .badge { background: var(--gold); color: #000; font-size: 10px; font-weight: 600; border-radius: 20px; padding: 1px 6px; min-width: 18px; text-align: center; }
  .badge.red { background: var(--red); color: #fff; }
  .badge.plex { background: var(--plex); color: #000; }

  .plex-status { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .plex-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.3s; }
  .plex-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .plex-dot.connecting { background: var(--plex); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .plex-label { color: var(--muted); }
  .plex-btn { padding: 6px 12px; border: 1px solid var(--border2); border-radius: 7px; background: transparent; color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 5px; }
  .plex-btn:hover { color: var(--plex); border-color: var(--plex); }
  .plex-btn.syncing { color: var(--plex); border-color: var(--plex); }

  /* MAIN */
  .main { padding: 24px; max-width: 1300px; margin: 0 auto; }
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 180px; position: relative; }
  .search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }
  .search-wrap input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px 9px 36px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 13px; outline: none; transition: border 0.2s; }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--border2); }
  .filter-btn { padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg2); color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .filter-btn.active { background: var(--bg3); border-color: var(--gold); color: var(--gold); }
  .filter-btn:hover:not(.active) { color: var(--light); border-color: var(--border2); }
  .add-btn { padding: 9px 14px; border: none; border-radius: 8px; background: var(--gold); color: #000; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s; white-space: nowrap; }
  .add-btn:hover { background: var(--gold2); }
  .sync-btn { padding: 9px 14px; border: 1px solid rgba(229,160,13,0.4); border-radius: 8px; background: rgba(229,160,13,0.1); color: var(--plex); font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s; white-space: nowrap; }
  .sync-btn:hover { background: rgba(229,160,13,0.2); }
  .sync-btn:disabled { opacity: 0.5; cursor: default; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; text-align: center; }
  .stat-num { font-family: 'Bebas Neue', cursive; font-size: 28px; letter-spacing: 1px; color: var(--gold); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
  .movie-card { position: relative; border-radius: 10px; overflow: hidden; cursor: pointer; background: var(--card); border: 1px solid var(--border); transition: transform 0.2s, border-color 0.2s; aspect-ratio: 2/3; }
  .movie-card:hover { transform: scale(1.03); border-color: var(--border2); }
  .movie-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .poster-fallback { width: 100%; height: 100%; background: linear-gradient(145deg, #1a1a2e, #16213e); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 12px; text-align: center; position: absolute; inset: 0; border-radius: 10px; }
  .poster-fallback i { font-size: 32px; color: var(--muted); }
  .poster-fallback span { font-size: 11px; color: var(--light); font-weight: 500; line-height: 1.3; }
  .overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.92)); padding: 28px 10px 10px; }
  .overlay-title { font-size: 12px; font-weight: 600; color: #fff; line-height: 1.3; margin-bottom: 4px; }
  .overlay-meta { font-size: 10px; color: var(--muted); }
  .watched-badge { position: absolute; top: 8px; right: 8px; background: rgba(46,204,113,0.9); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
  .watched-badge i { font-size: 12px; color: #fff; }
  .type-badge { position: absolute; top: 8px; left: 8px; padding: 2px 7px; border-radius: 4px; font-size: 9px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .type-movie { background: rgba(232,53,75,0.85); color: #fff; }
  .type-tv { background: rgba(138,90,240,0.85); color: #fff; }
  .plex-badge { position: absolute; bottom: 38px; right: 6px; background: rgba(229,160,13,0.9); border-radius: 4px; padding: 1px 5px; font-size: 9px; font-weight: 700; color: #000; letter-spacing: 0.3px; }

  /* MODALS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; width: 100%; max-width: 660px; max-height: 90vh; overflow-y: auto; position: relative; }
  .modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  .modal-close { position: absolute; top: 14px; right: 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 18px; z-index: 10; transition: color 0.2s; }
  .modal-close:hover { color: var(--text); }
  .modal-hero { display: flex; gap: 20px; padding: 20px; border-bottom: 1px solid var(--border); }
  .modal-poster { width: 120px; height: 180px; border-radius: 10px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border); }
  .modal-poster-fallback { width: 120px; height: 180px; border-radius: 10px; background: var(--bg3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .modal-info { flex: 1; min-width: 0; }
  .modal-title { font-family: 'Bebas Neue', cursive; font-size: 26px; letter-spacing: 1px; line-height: 1.1; margin-bottom: 6px; }
  .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; border: 1px solid var(--border); }
  .tag-year { color: var(--muted); }
  .tag-genre { background: var(--bg3); color: var(--light); }
  .tag-rating { background: rgba(232,184,75,0.1); color: var(--gold); border-color: rgba(232,184,75,0.3); }
  .tag-movie { background: rgba(232,53,75,0.1); color: #f07080; border-color: rgba(232,53,75,0.3); }
  .tag-tv { background: rgba(138,90,240,0.1); color: #b080f0; border-color: rgba(138,90,240,0.3); }
  .tag-plex { background: rgba(229,160,13,0.15); color: var(--plex); border-color: rgba(229,160,13,0.3); }
  .modal-plot { font-size: 13px; color: var(--light); line-height: 1.6; margin-bottom: 14px; }
  .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .action-btn { padding: 8px 14px; border-radius: 8px; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border2); display: flex; align-items: center; gap: 6px; transition: all 0.2s; text-decoration: none; background: transparent; }
  .btn-watched { background: rgba(46,204,113,0.15); color: var(--green); border-color: rgba(46,204,113,0.3); }
  .btn-watched.is-watched { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-imdb { background: rgba(245,197,48,0.1); color: #f5c530; border-color: rgba(245,197,48,0.3); }
  .btn-plex { background: rgba(229,160,13,0.1); color: var(--plex); border-color: rgba(229,160,13,0.3); }
  .btn-delete { background: rgba(232,53,75,0.1); color: var(--red); border-color: rgba(232,53,75,0.3); }
  .modal-body { padding: 16px 20px 20px; }
  .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; gap: 12px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: var(--muted); flex-shrink: 0; }
  .detail-value { color: var(--text); font-weight: 500; text-align: right; }
  .progress-bar-wrap { flex: 1; background: var(--bg3); border-radius: 4px; height: 4px; min-width: 60px; }
  .progress-bar-fill { height: 4px; border-radius: 4px; background: var(--plex); transition: width 0.3s; }

  /* PLEX SETUP MODAL */
  .setup-modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; width: 100%; max-width: 500px; padding: 28px; position: relative; }
  .setup-title { font-family: 'Bebas Neue', cursive; font-size: 24px; letter-spacing: 1px; color: var(--plex); margin-bottom: 6px; }
  .setup-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
  .setup-steps { background: var(--bg3); border-radius: 10px; padding: 14px 16px; margin-bottom: 20px; }
  .setup-step { font-size: 12px; color: var(--light); padding: 4px 0; display: flex; gap: 10px; align-items: flex-start; line-height: 1.5; }
  .setup-step-num { color: var(--plex); font-weight: 700; flex-shrink: 0; }
  .setup-step a { color: var(--plex); text-decoration: none; }
  .setup-step a:hover { text-decoration: underline; }
  .form-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
  .form-input { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 13px; outline: none; transition: border 0.2s; width: 100%; }
  .form-input::placeholder { color: var(--muted); }
  .form-input:focus { border-color: var(--plex); }
  .form-hint { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
  .connect-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--plex); color: #000; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; margin-top: 4px; }
  .connect-btn:hover { background: #f0b020; }
  .connect-btn:disabled { opacity: 0.5; cursor: default; }
  .connect-error { background: rgba(232,53,75,0.1); border: 1px solid rgba(232,53,75,0.3); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #f07080; margin-top: 12px; display: none; }
  .connect-error.show { display: block; }
  .server-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .server-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: space-between; }
  .server-item:hover { border-color: var(--plex); }
  .server-item.selected { border-color: var(--plex); background: rgba(229,160,13,0.08); }
  .server-name { font-weight: 600; font-size: 14px; }
  .server-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .server-check { color: var(--plex); font-size: 18px; display: none; }
  .server-item.selected .server-check { display: block; }

  /* ADD MODAL */
  .add-modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; width: 100%; max-width: 520px; padding: 24px; position: relative; max-height: 90vh; overflow-y: auto; }
  .add-modal::-webkit-scrollbar { width: 4px; }
  .add-modal::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  .add-modal-title { font-family: 'Bebas Neue', cursive; font-size: 22px; letter-spacing: 1px; color: var(--gold); margin-bottom: 16px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .form-field-add { display: flex; flex-direction: column; gap: 5px; }
  .form-field-add.full { grid-column: 1/-1; }
  .form-input-add { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 13px; outline: none; transition: border 0.2s; }
  .form-input-add::placeholder { color: var(--muted); }
  .form-input-add:focus { border-color: var(--gold); }
  select.form-input-add option { background: var(--bg2); }
  textarea.form-input-add { resize: vertical; }
  .search-title-row { display: flex; gap: 8px; align-items: flex-end; }
  .search-title-row .form-input-add { flex: 1; }
  .lookup-btn { padding: 9px 14px; border: none; border-radius: 8px; background: var(--gold); color: #000; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 5px; transition: background 0.2s; flex-shrink: 0; }
  .lookup-btn:hover { background: var(--gold2); }
  .lookup-btn:disabled { opacity: 0.5; cursor: default; }
  .lookup-preview { background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px; padding: 12px; margin-bottom: 10px; display: flex; gap: 12px; align-items: flex-start; }
  .lookup-thumb { width: 60px; height: 90px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
  .lookup-thumb-fallback { width: 60px; height: 90px; border-radius: 6px; background: var(--card); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .lookup-info { flex: 1; }
  .lookup-title-text { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .lookup-meta { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .lookup-plot { font-size: 12px; color: var(--light); line-height: 1.5; }
  .lookup-status { font-size: 12px; color: var(--muted); padding: 6px 0; }
  .lookup-status.error { color: var(--red); }
  .lookup-status.loading { color: var(--gold); }
  .submit-btn { padding: 10px 20px; border: none; border-radius: 8px; background: var(--gold); color: #000; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.2s; }
  .submit-btn:hover { background: var(--gold2); }

  /* REQUESTS */
  .req-form { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
  .form-title { font-family: 'Bebas Neue', cursive; font-size: 20px; letter-spacing: 1px; margin-bottom: 16px; color: var(--gold); }
  .req-list { display: flex; flex-direction: column; gap: 10px; }
  .req-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .req-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  .req-info { flex: 1; min-width: 120px; }
  .req-name { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
  .req-sub { font-size: 12px; color: var(--muted); }
  .req-status { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .status-pending { background: rgba(232,184,75,0.15); color: var(--gold); }
  .status-added { background: rgba(46,204,113,0.15); color: var(--green); }
  .req-approve { padding: 6px 12px; border: 1px solid rgba(46,204,113,0.3); border-radius: 7px; background: rgba(46,204,113,0.1); color: var(--green); font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .req-approve:hover { background: rgba(46,204,113,0.2); }

  /* MISC */
  .section-label { font-family: 'Bebas Neue', cursive; font-size: 18px; letter-spacing: 1px; margin-bottom: 14px; color: var(--light); display: flex; align-items: center; gap: 10px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
  .empty-state i { font-size: 48px; margin-bottom: 12px; display: block; }
  .empty-state p { font-size: 15px; margin-bottom: 12px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--green); color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transform: translateY(10px); transition: all 0.3s; display: flex; align-items: center; gap: 8px; pointer-events: none; max-width: 300px; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: var(--red); }
  .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  .loading-overlay.show { display: flex; }
  .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border2); border-top-color: var(--plex); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--light); font-size: 14px; }
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">Syncing with Plex...</div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">Mc<span>Flix</span></div>
  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('library',this)">
      <i class="ti ti-stack-2"></i> Library <span class="badge" id="lib-count">0</span>
    </button>
    <button class="nav-btn" onclick="switchTab('wishlist',this)">
      <i class="ti ti-bookmark"></i> Wishlist <span class="badge" id="wish-count">0</span>
    </button>
    <button class="nav-btn" onclick="switchTab('requests',this)">
      <i class="ti ti-message-circle"></i> Requests <span class="badge red" id="req-count" style="display:none">0</span>
    </button>
  </div>
  <div class="plex-status">
    <div class="plex-dot" id="plex-dot"></div>
    <span class="plex-label" id="plex-label">Plex not connected</span>
    <button class="plex-btn" id="plex-connect-btn" onclick="openPlexSetup()">
      <i class="ti ti-plug"></i> Connect
    </button>
  </div>
</div>

<div class="main">

  <!-- LIBRARY TAB -->
  <div class="tab-panel active" id="tab-library">
    <div class="stats-row" id="stats-row"></div>
    <div class="toolbar">
      <div class="search-wrap">
        <i class="ti ti-search"></i>
        <input type="text" id="search-lib" placeholder="Search library..." oninput="renderLibrary()">
      </div>
      <button class="filter-btn active" onclick="setFilter(this,'all')">All</button>
      <button class="filter-btn" onclick="setFilter(this,'movie')">Movies</button>
      <button class="filter-btn" onclick="setFilter(this,'tv')">TV Shows</button>
      <button class="filter-btn" onclick="setFilter(this,'watched')">Watched</button>

<div class="toast" id="toast"><i class="ti ti-check"></i> <span id="toast-msg"></span></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const OMDB_KEY = 'trilogy'; // Replace with your own from omdbapi.com
const STORAGE_KEY = 'mcflix_v4';
const COLORS = ['#e8354b','#8a5af0','#2ecc71','#e8b84b','#3498db','#e67e22'];

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = { library: [], wishlist: [], requests: [] };
let plexConfig = { token: '', serverUrl: '', serverName: '', clientId: '' };
let libFilter = 'all';
let addMode = 'library';
let pendingPoster = '';
let pendingImdb = '';
let selectedServer = null;
let availableServers = [];

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function colorFor(n) { let h=0; for(let c of n) h=(h<<5)-h+c.charCodeAt(0); return COLORS[Math.abs(h)%COLORS.length]; }
function initials(n) { return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function uid() { return Date.now() + Math.random(); }

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.className = 'toast' + (isError ? ' error' : '');
  t.innerHTML = `<i class="ti ti-${isError?'alert-circle':'check'}"></i> <span>${msg}</span>`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function showLoading(msg='Loading...') {
  document.getElementById('loading-text').textContent = msg;
  document.getElementById('loading-overlay').classList.add('show');
}
function hideLoading() { document.getElementById('loading-overlay').classList.remove('show'); }

// ─── STORAGE ──────────────────────────────────────────────────────────────────
function load() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) state = JSON.parse(s);
  } catch(e) {}
  try {
    const p = localStorage.getItem('mcflix_plex');
    if (p) plexConfig = JSON.parse(p);
  } catch(e) {}
}
function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }
function savePlex() { try { localStorage.setItem('mcflix_plex', JSON.stringify(plexConfig)); } catch(e) {} }

// ─── PLEX API ─────────────────────────────────────────────────────────────────
// NOTE: Plex requires requests go through their API. Because browsers block
// cross-origin requests to local Plex servers, we use the Plex.tv relay API
// (api.thetvdb.com route via Plex). For local servers you may need to open
// the file via a local web server (e.g. VS Code Live Server) and ensure
// CORS is enabled in Plex Settings > Network > "Enable server access on local network".

function plexHeaders(token) {
  return {
    'X-Plex-Token': token,
    'X-Plex-Client-Identifier': plexConfig.clientId || 'mcflix-app',
    'X-Plex-Product': 'McFlix',
    'X-Plex-Version': '1.0',
    'Accept': 'application/json',
  };
}

async function plexFetch(path, token, baseUrl) {
  const url = (baseUrl || plexConfig.serverUrl).replace(/\/$/, '') + path;
  const res = await fetch(url, { headers: plexHeaders(token || plexConfig.token) });
  if (!res.ok) throw new Error(`Plex API error: ${res.status} ${res.statusText}`);
  return res.json();
}

async function fetchPlexServers(token) {
  // Get list of servers from Plex.tv
  const res = await fetch('https://plex.tv/api/v2/resources?includeHttps=1&includeRelay=1', {
    headers: {
      ...plexHeaders(token),
      'X-Plex-Client-Identifier': 'mcflix-' + Math.random().toString(36).slice(2),
    }
  });
  if (!res.ok) throw new Error('Could not reach Plex.tv. Check your token.');
  const data = await res.json();
  // Filter to Media Servers only
  return data.filter(d => d.provides && d.provides.includes('server'));
}

async function fetchPlexLibraries(serverUrl, token) {
  const data = await plexFetch('/library/sections', token, serverUrl);
  return data.MediaContainer.Directory || [];
}

async function fetchPlexSection(serverUrl, token, sectionKey, type) {
  const data = await plexFetch(`/library/sections/${sectionKey}/all?type=${type}`, token, serverUrl);
  return data.MediaContainer.Metadata || [];
}

function plexPosterUrl(thumb) {
  if (!thumb || !plexConfig.serverUrl || !plexConfig.token) return '';
  return `${plexConfig.serverUrl.replace(/\/$/,'')}${thumb}?X-Plex-Token=${plexConfig.token}`;
}

function plexItemToLocal(item, type) {
  return {
    id: 'plex_' + item.ratingKey,
    title: item.title,
    type: type,
    year: item.year ? String(item.year) : '',
    genre: item.Genre ? item.Genre.map(g=>g.tag).join(', ') : '',
    rating: item.contentRating || '',
    plot: item.summary || '',
    imdb: (item.Guid || []).find(g=>g.id&&g.id.startsWith('imdb://'))?.id?.replace('imdb://','') || '',
    poster: plexPosterUrl(item.thumb),
    format: 'Plex',
    watched: type === 'movie' ? (item.viewCount > 0) : (item.leafCount === item.viewedLeafCount),
    plexKey: item.ratingKey,
    plexThumb: item.thumb,
    viewOffset: item.viewOffset || 0,
    duration: item.duration || 0,
    plexSource: true,
    lastSync: Date.now(),
  };
}

async function syncPlex() {
  if (!plexConfig.token || !plexConfig.serverUrl) {
    openPlexSetup(); return;
  }
  const btn = document.getElementById('sync-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-refresh" style="animation:spin 0.8s linear infinite"></i> Syncing...';
  showLoading('Syncing your Plex library...');
  try {
    const libs = await fetchPlexLibraries(plexConfig.serverUrl, plexConfig.token);
    const newItems = [];
    for (const lib of libs) {
      if (lib.type === 'movie') {
        const items = await fetchPlexSection(plexConfig.serverUrl, plexConfig.token, lib.key, 1);
        items.forEach(item => newItems.push(plexItemToLocal(item, 'movie')));
      } else if (lib.type === 'show') {
        const items = await fetchPlexSection(plexConfig.serverUrl, plexConfig.token, lib.key, 2);
        items.forEach(item => newItems.push(plexItemToLocal(item, 'tv')));
      }
    }
    // Merge: keep manual items, replace/add plex items
    const manualItems = state.library.filter(m => !m.plexSource);
    const plexIds = new Set(newItems.map(m => m.id));
    state.library = [...manualItems, ...newItems];
    save();
    renderLibrary(); updateCounts();
    showToast(`Synced ${newItems.length} titles from Plex!`);
    updatePlexStatus(true);
  } catch(e) {
    console.error(e);
    showToast('Sync failed: ' + (e.message || 'Unknown error'), true);
  }
  hideLoading();
  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-refresh"></i> Sync Plex';
}

// ─── PLEX SETUP MODAL ─────────────────────────────────────────────────────────
function openPlexSetup() {
  if (plexConfig.token && plexConfig.serverUrl) {
    renderPlexManage();
  } else {
    renderPlexStep1();
  }
  document.getElementById('plex-modal').classList.add('open');
}
function closePlexSetup() { document.getElementById('plex-modal').classList.remove('open'); }

function renderPlexStep1() {
  document.getElementById('plex-setup-content').innerHTML = `
    <div class="setup-title">Connect to Plex</div>
    <div class="setup-sub">Enter your Plex token to sync your library automatically.</div>
    <div class="setup-steps">
      <div class="setup-step"><span class="setup-step-num">1</span><span>Sign in at <a href="https://app.plex.tv" target="_blank">app.plex.tv</a> in your browser</span></div>
      <div class="setup-step"><span class="setup-step-num">2</span><span>Open <a href="https://plex.tv/claim" target="_blank">plex.tv/claim</a> — your token shows at the top, or see the URL bar after signing in to plex.tv (copy the <strong>?X-Plex-Token=</strong> value)</span></div>
      <div class="setup-step"><span class="setup-step-num">3</span><span>Alternatively: in Plex Web, open any media → ••• → Get Info → View XML → copy the <strong>X-Plex-Token</strong> from the URL</span></div>
    </div>
    <div class="form-field">
      <label class="form-label">Plex Token</label>
      <input type="password" class="form-input" id="plex-token-input" placeholder="xxxxxxxxxxxxxxxxxxxx" autocomplete="off">
      <div class="form-hint">Your token is stored locally in your browser only and never sent anywhere except to Plex.</div>
    </div>
    <div class="connect-error" id="plex-error"></div>
    <button class="connect-btn" id="plex-connect-go" onclick="connectPlexStep1()">
      <i class="ti ti-plug"></i> Connect & Find Servers
    </button>`;
}

async function connectPlexStep1() {
  const token = document.getElementById('plex-token-input').value.trim();
  const errEl = document.getElementById('plex-error');
  const btn = document.getElementById('plex-connect-go');
  if (!token) { errEl.textContent = 'Please enter your Plex token.'; errEl.classList.add('show'); return; }
  errEl.classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader" style="animation:spin 0.8s linear infinite"></i> Finding servers...';
  try {
    const servers = await fetchPlexServers(token);
    if (!servers.length) throw new Error('No Plex Media Servers found for this account.');
    availableServers = servers;
    plexConfig.token = token;
    plexConfig.clientId = 'mcflix-' + Math.random().toString(36).slice(2);
    renderPlexStep2(servers);
  } catch(e) {
    errEl.textContent = e.message || 'Could not connect. Check your token.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-plug"></i> Connect & Find Servers';
  }
}

function renderPlexStep2(servers) {
  document.getElementById('plex-setup-content').innerHTML = `
    <div class="setup-title">Choose Your Server</div>
    <div class="setup-sub">Found ${servers.length} server${servers.length!==1?'s':''} on your account. Pick one to sync from.</div>
    <div class="server-list" id="server-list">
      ${servers.map((s,i) => {
        const conn = s.connections && s.connections[0];
        return `<div class="server-item" onclick="selectServer(${i})" id="srv-${i}">
          <div>
            <div class="server-name"><i class="ti ti-server" style="font-size:14px;margin-right:6px;color:var(--plex)"></i>${s.name}</div>
            <div class="server-meta">${conn ? conn.address : 'No address'} · ${s.productVersion||''}</div>
          </div>
          <i class="ti ti-check server-check"></i>
        </div>`;
      }).join('')}
    </div>
    <div class="connect-error" id="plex-error2"></div>
    <button class="connect-btn" id="plex-connect-go2" onclick="connectPlexStep2()">
      <i class="ti ti-download"></i> Sync This Server
    </button>`;
  // Auto-select first
  selectServer(0);
}

function selectServer(i) {
  selectedServer = availableServers[i];
  document.querySelectorAll('.server-item').forEach(el => el.classList.remove('selected'));
  document.getElementById('srv-' + i).classList.add('selected');
}

async function connectPlexStep2() {
  if (!selectedServer) return;
  const errEl = document.getElementById('plex-error2');
  const btn = document.getElementById('plex-connect-go2');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader" style="animation:spin 0.8s linear infinite"></i> Connecting...';
  errEl.classList.remove('show');

  // Try each connection until one works
  const connections = selectedServer.connections || [];
  // Prefer https, then http, then relay
  const sorted = [...connections].sort((a,b) => {
    if (a.relay && !b.relay) return 1;
    if (!a.relay && b.relay) return -1;
    if (a.protocol === 'https' && b.protocol !== 'https') return -1;
    return 0;
  });

  let connected = false;
  for (const conn of sorted) {
    try {
      const testUrl = conn.uri || `${conn.protocol}://${conn.address}:${conn.port}`;
      await plexFetch('/library/sections', plexConfig.token, testUrl);
      plexConfig.serverUrl = testUrl;
      plexConfig.serverName = selectedServer.name;
      connected = true;
      break;
    } catch(e) { continue; }
  }

  if (!connected) {
    errEl.textContent = 'Could not reach this server. Make sure Plex is running and accessible, then try again.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-download"></i> Sync This Server';
    return;
  }

  savePlex();
  closePlexSetup();
  updatePlexStatus(true);
  document.getElementById('sync-btn').style.display = '';
  showLoading('Importing your Plex library...');
  await syncPlex();
  hideLoading();
}

function renderPlexManage() {
  document.getElementById('plex-setup-content').innerHTML = `
    <div class="setup-title">Plex Connected</div>
    <div class="setup-sub">Connected to <strong style="color:var(--plex)">${plexConfig.serverName || plexConfig.serverUrl}</strong></div>
    <div class="setup-steps">
      <div class="setup-step"><span class="setup-step-num" style="color:var(--green)"><i class="ti ti-check"></i></span><span>Server: ${plexConfig.serverName || 'Unknown'}</span></div>
      <div class="setup-step"><span class="setup-step-num" style="color:var(--green)"><i class="ti ti-check"></i></span><span>URL: ${plexConfig.serverUrl}</span></div>
      <div class="setup-step"><span class="setup-step-num" style="color:var(--green)"><i class="ti ti-check"></i></span><span>${state.library.filter(m=>m.plexSource).length} titles synced from Plex</span></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap">
      <button class="connect-btn" style="flex:1;min-width:120px" onclick="closePlexSetup();syncPlex()">
        <i class="ti ti-refresh"></i> Sync Now
      </button>
      <button class="connect-btn" style="flex:1;min-width:120px;background:var(--red);color:#fff" onclick="disconnectPlex()">
        <i class="ti ti-unlink"></i> Disconnect
      </button>
    </div>`;
}

function disconnectPlex() {
  if (!confirm('Disconnect Plex? This will remove all Plex-synced titles from your library.')) return;
  plexConfig = { token: '', serverUrl: '', serverName: '', clientId: '' };
  state.library = state.library.filter(m => !m.plexSource);
  savePlex(); save(); closePlexSetup();
  updatePlexStatus(false);
  document.getElementById('sync-btn').style.display = 'none';
  renderLibrary(); updateCounts();
  showToast('Plex disconnected');
}

function updatePlexStatus(connected) {
  const dot = document.getElementById('plex-dot');
  const label = document.getElementById('plex-label');
  const btn = document.getElementById('plex-connect-btn');
  if (connected && plexConfig.serverName) {
    dot.className = 'plex-dot connected';
    label.textContent = plexConfig.serverName;
    btn.innerHTML = '<i class="ti ti-settings"></i> Manage';
  } else {
    dot.className = 'plex-dot';
    label.textContent = 'Plex not connected';
    btn.innerHTML = '<i class="ti ti-plug"></i> Connect';
  }
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(t, el) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (t === 'library') renderLibrary();
  if (t === 'wishlist') renderWishlist();
  if (t === 'requests') renderRequests();
}

function setFilter(el, f) {
  libFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderLibrary();
}

function updateCounts() {
  document.getElementById('lib-count').textContent = state.library.length;
  document.getElementById('wish-count').textContent = state.wishlist.length;
  const p = state.requests.filter(r => r.status === 'pending').length;
  const rc = document.getElementById('req-count');
  rc.textContent = p; rc.style.display = p ? '' : 'none';
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function renderStats() {
  const total = state.library.length;
  const watched = state.library.filter(m => m.watched).length;
  const movies = state.library.filter(m => m.type === 'movie').length;
  const tv = state.library.filter(m => m.type === 'tv').length;
  const fromPlex = state.library.filter(m => m.plexSource).length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total Titles</div></div>
    <div class="stat-card"><div class="stat-num">${watched}</div><div class="stat-label">Watched</div></div>
    <div class="stat-card"><div class="stat-num">${total-watched}</div><div class="stat-label">Unwatched</div></div>
    <div class="stat-card"><div class="stat-num">${movies}</div><div class="stat-label">Movies</div></div>
    <div class="stat-card"><div class="stat-num">${tv}</div><div class="stat-label">TV Shows</div></div>
    ${fromPlex ? `<div class="stat-card"><div class="stat-num" style="color:var(--plex)">${fromPlex}</div><div class="stat-label">From Plex</div></div>` : ''}`;
}

// ─── CARD HTML ────────────────────────────────────────────────────────────────
function cardHTML(m, src) {
  const hasPoster = m.poster && m.poster !== 'N/A';
  return `<div class="movie-card" onclick="openDetail('${m.id}','${src}')">
    ${hasPoster ? `<img src="${m.poster}" alt="${m.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
    <div class="poster-fallback" style="display:${hasPoster?'none':'flex'}">
      <i class="ti ti-movie"></i><span>${m.title}</span>
    </div>
    <div class="overlay">
      <div class="overlay-title">${m.title}</div>
      <div class="overlay-meta">${m.year||''}${m.genre?' · '+m.genre.split(',')[0]:''}</div>
    </div>
    ${m.watched ? `<div class="watched-badge"><i class="ti ti-check"></i></div>` : ''}
    <div class="type-badge ${m.type==='movie'?'type-movie':'type-tv'}">${m.type==='movie'?'Film':'TV'}</div>
    ${m.plexSource ? `<div class="plex-badge">PLEX</div>` : ''}
  </div>`;
}

// ─── RENDER LIBRARY ───────────────────────────────────────────────────────────
function renderLibrary() {
  renderStats();
  const q = (document.getElementById('search-lib').value || '').toLowerCase();
  let items = state.library.filter(m => {
    if (q && !m.title.toLowerCase().includes(q)) return false;
    if (libFilter === 'movie') return m.type === 'movie';
    if (libFilter === 'tv') return m.type === 'tv';
    if (libFilter === 'watched') return m.watched;
    if (libFilter === 'unwatched') return !m.watched;
    if (libFilter === 'plex') return m.plexSource;
    return true;
  });
  const grid = document.getElementById('library-grid');
  const empty = document.getElementById('lib-empty');
  if (!items.length) { grid.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  grid.innerHTML = items.map(m => cardHTML(m, 'library')).join('');
  updateCounts();
}

// ─── RENDER WISHLIST ──────────────────────────────────────────────────────────
function renderWishlist() {
  const q = (document.getElementById('search-wish').value || '').toLowerCase();
  let items = state.wishlist.filter(m => !q || m.title.toLowerCase().includes(q));
  const grid = document.getElementById('wishlist-grid');
  const empty = document.getElementById('wish-empty');
  if (!items.length) { grid.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  grid.innerHTML = items.map(m => cardHTML(m, 'wishlist')).join('');
  updateCounts();
}

// ─── RENDER REQUESTS ──────────────────────────────────────────────────────────
function renderRequests() {
  const list = document.getElementById('req-list');
  const empty = document.getElementById('req-empty');
  if (!state.requests.length) { list.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  list.innerHTML = state.requests.slice().reverse().map(r => `
    <div class="req-card">
      <div class="req-avatar" style="background:${colorFor(r.from)}22;color:${colorFor(r.from)}">${initials(r.from)}</div>
      <div class="req-info">
        <div class="req-name">${r.title} <span style="font-size:11px;color:var(--muted)">(${r.type==='movie'?'Movie':'TV'})</span></div>
        <div class="req-sub">Requested by <strong>${r.from}</strong>${r.note?' · '+r.note:''}</div>
      </div>
      <div class="req-status status-${r.status}">${r.status==='pending'?'Pending':'Added ✓'}</div>
      ${r.status==='pending' ? `<button class="req-approve" onclick="approveRequest(${r.id})">Add to Wishlist</button>` : ''}
    </div>`).join('');
  updateCounts();
}

function approveRequest(id) {
  const req = state.requests.find(r => r.id === id);
  if (!req) return;
  req.status = 'added';
  state.wishlist.push({ id: uid(), title: req.title, type: req.type, year:'', genre:'', rating:'', plot:'', imdb:'', poster:'', format:'', watched:false });
  save(); renderRequests(); updateCounts();
  showToast(req.title + ' added to wishlist');
}

function submitRequest() {
  const name = document.getElementById('req-name').value.trim();
  const title = document.getElementById('req-title').value.trim();
  if (!name || !title) { alert('Please enter your name and a title.'); return; }
  state.requests.push({ id: uid(), from: name, title, type: document.getElementById('req-type').value, note: document.getElementById('req-note').value.trim(), status: 'pending', ts: Date.now() });
  save();
  ['req-name','req-title','req-note'].forEach(id => document.getElementById(id).value = '');
  renderRequests(); updateCounts(); showToast('Request sent!');
}

// ─── DETAIL MODAL ─────────────────────────────────────────────────────────────
function openDetail(id, src) {
  const list = src === 'library' ? state.library : state.wishlist;
  const m = list.find(x => String(x.id) === String(id));
  if (!m) return;
  const hasPoster = m.poster && m.poster !== 'N/A';
  const inLib = !!state.library.find(x => String(x.id) === String(id));
  const progress = m.duration > 0 ? Math.round((m.viewOffset / m.duration) * 100) : 0;
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-hero">
      ${hasPoster ? `<img src="${m.poster}" class="modal-poster" onerror="this.style.display='none'">` : `<div class="modal-poster-fallback"><i class="ti ti-movie" style="font-size:36px;color:var(--muted)"></i></div>`}
      <div class="modal-info">
        <div class="modal-title">${m.title}</div>
        <div class="modal-tags">
          ${m.year ? `<span class="tag tag-year">${m.year}</span>` : ''}
          ${m.genre ? m.genre.split(',').slice(0,2).map(g=>`<span class="tag tag-genre">${g.trim()}</span>`).join('') : ''}
          ${m.rating ? `<span class="tag tag-rating">${m.rating}</span>` : ''}
          <span class="tag ${m.type==='movie'?'tag-movie':'tag-tv'}">${m.type==='movie'?'Movie':'TV Show'}</span>
          ${m.plexSource ? `<span class="tag tag-plex"><i class="ti ti-brand-plex" style="font-size:10px"></i> Plex</span>` : ''}
        </div>
        ${m.plot && m.plot !== 'N/A' ? `<div class="modal-plot">${m.plot}</div>` : ''}
        <div class="modal-actions">
          ${inLib ? `<button class="action-btn btn-watched ${m.watched?'is-watched':''}" onclick="toggleWatched('${m.id}')">
            <i class="ti ti-${m.watched?'eye-off':'eye'}"></i> ${m.watched?'Watched':'Mark Watched'}
          </button>` : ''}
          ${m.imdb && m.imdb !== 'N/A' ? `<a href="https://www.imdb.com/title/${m.imdb}/" class="action-btn btn-imdb" target="_blank"><i class="ti ti-external-link"></i> IMDb</a>` : ''}
          ${m.plexSource && plexConfig.serverUrl ? `<a href="${plexConfig.serverUrl.replace(/\/$/,'')}/web/index.html#!/server/${m.plexKey}/details" class="action-btn btn-plex" target="_blank"><i class="ti ti-player-play"></i> Open in Plex</a>` : ''}
          ${!inLib ? `<button class="action-btn btn-watched" onclick="moveToLibrary('${m.id}')"><i class="ti ti-plus"></i> Add to Library</button>` : ''}
          <button class="action-btn btn-delete" onclick="deleteItem('${m.id}','${src}')"><i class="ti ti-trash"></i> Remove</button>
        </div>
      </div>
    </div>
    <div class="modal-body">
      ${m.format ? `<div class="detail-row"><span class="detail-label">Format / Location</span><span class="detail-value">${m.format}</span></div>` : ''}
      ${m.imdb && m.imdb !== 'N/A' ? `<div class="detail-row"><span class="detail-label">IMDb</span><span class="detail-value" style="color:var(--gold)">imdb.com/title/${m.imdb}</span></div>` : ''}
      ${progress > 0 && progress < 100 ? `<div class="detail-row">
        <span class="detail-label">Progress</span>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
        <span class="detail-value" style="min-width:36px">${progress}%</span>
      </div>` : ''}
    </div>`;
  document.getElementById('detail-modal').classList.add('open');
}

function closeModal() { document.getElementById('detail-modal').classList.remove('open'); }

function toggleWatched(id) {
  const m = state.library.find(x => String(x.id) === String(id));
  if (!m) return;
  m.watched = !m.watched;
  save(); openDetail(id, 'library'); renderLibrary();
  showToast(m.watched ? 'Marked as watched!' : 'Marked as unwatched');
}

function moveToLibrary(id) {
  const m = state.wishlist.find(x => String(x.id) === String(id));
  if (m) {
    state.library.push({ ...m, id: uid(), watched: false });
    state.wishlist = state.wishlist.filter(x => String(x.id) !== String(id));
    save(); closeModal(); renderLibrary(); renderWishlist(); updateCounts();
    showToast(m.title + ' added to library!');
  }
}

function deleteItem(id, src) {
  if (!confirm('Remove this title?')) return;
  if (src === 'library') state.library = state.library.filter(x => String(x.id) !== String(id));
  else state.wishlist = state.wishlist.filter(x => String(x.id) !== String(id));
  save(); closeModal();
  if (src === 'library') renderLibrary(); else renderWishlist();
  updateCounts();
}

// ─── ADD MODAL ────────────────────────────────────────────────────────────────
function openAddModal(target) {
  addMode = target;
  pendingPoster = ''; pendingImdb = '';
  document.getElementById('add-modal-title').textContent = target === 'library' ? 'Add to Library' : 'Add to Wishlist';
  document.getElementById('add-watched-field').style.display = target === 'library' ? 'flex' : 'none';
  ['add-title','add-year','add-genre','add-rating','add-format','add-plot','add-search-input'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('add-type').value = 'movie';
  document.getElementById('add-watched').checked = false;
  document.getElementById('lookup-result').innerHTML = '';
  document.getElementById('add-modal').classList.add('open');
}
function closeAddModal() { document.getElementById('add-modal').classList.remove('open'); }

async function lookupTitle() {
  const q = document.getElementById('add-search-input').value.trim();
  if (!q) return;
  const btn = document.getElementById('lookup-btn');
  const res = document.getElementById('lookup-result');
  btn.disabled = true;
  res.innerHTML = `<div class="lookup-status loading"><i class="ti ti-loader"></i> Searching...</div>`;
  try {
    const type = document.getElementById('add-type').value === 'tv' ? 'series' : 'movie';
    const r = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&t=${encodeURIComponent(q)}&type=${type}`);
    const d = await r.json();
    if (d.Response === 'True') {
      pendingPoster = d.Poster && d.Poster !== 'N/A' ? d.Poster : '';
      pendingImdb = d.imdbID || '';
      document.getElementById('add-title').value = d.Title || '';
      document.getElementById('add-year').value = d.Year || '';
      document.getElementById('add-genre').value = d.Genre || '';
      document.getElementById('add-rating').value = d.Rated || '';
      document.getElementById('add-plot').value = d.Plot && d.Plot !== 'N/A' ? d.Plot : '';
      const hasPoster = d.Poster && d.Poster !== 'N/A';
      res.innerHTML = `<div class="lookup-preview">
        ${hasPoster ? `<img src="${d.Poster}" class="lookup-thumb" onerror="this.style.display='none'">` : `<div class="lookup-thumb-fallback"><i class="ti ti-movie" style="font-size:24px;color:var(--muted)"></i></div>`}
        <div class="lookup-info">
          <div class="lookup-title-text">${d.Title} (${d.Year})</div>
          <div class="lookup-meta">${d.Genre||''} · ${d.Rated||''} · IMDb: ${d.imdbRating||'N/A'}</div>
          <div class="lookup-plot">${d.Plot && d.Plot !== 'N/A' ? d.Plot.slice(0,140)+'...' : ''}</div>
        </div></div>`;
    } else {
      res.innerHTML = `<div class="lookup-status error"><i class="ti ti-alert-circle"></i> Not found. Fill in manually below.</div>`;
    }
  } catch(e) {
    res.innerHTML = `<div class="lookup-status error">Search failed. Fill in manually below.</div>`;
  }
  btn.disabled = false;
}

function submitAdd() {
  const title = document.getElementById('add-title').value.trim();
  if (!title) { alert('Please enter a title.'); return; }
  const item = {
    id: uid(), title,
    type: document.getElementById('add-type').value,
    year: document.getElementById('add-year').value.trim(),
    genre: document.getElementById('add-genre').value.trim(),
    rating: document.getElementById('add-rating').value.trim(),
    imdb: pendingImdb, poster: pendingPoster,
    plot: document.getElementById('add-plot').value.trim(),
    format: document.getElementById('add-format').value.trim(),
    watched: addMode === 'library' ? document.getElementById('add-watched').checked : false,
    plexSource: false,
  };
  if (addMode === 'library') state.library.push(item);
  else state.wishlist.push(item);
  save(); closeAddModal();
  if (addMode === 'library') renderLibrary(); else renderWishlist();
  updateCounts(); showToast(title + ' added!');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
load();
renderLibrary();
updateCounts();
if (plexConfig.token && plexConfig.serverUrl) {
  updatePlexStatus(true);
  document.getElementById('sync-btn').style.display = '';
}
</script>
