  const poster=document.getElementById('add-poster').value.trim()||pendingPoster;
  const tags=document.getElementById('add-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const item={
    id:editingId||uid(),title,type:document.getElementById('add-type').value,
    year:document.getElementById('add-yr').value.trim(),
    genre:document.getElementById('add-gn').value.trim(),
    rating:document.getElementById('add-rat').value.trim(),
    director:document.getElementById('add-dir').value.trim(),
    actors:document.getElementById('add-act').value.trim(),
    plot:document.getElementById('add-plot').value.trim(),
    poster,imdb:pendingImdb,tags,
    addedAt:editingId?((sharedData.library.find(x=>x.id===editingId)||sharedData.wishlist.find(x=>x.id===editingId)||{}).addedAt||Date.now()):Date.now(),
  };
  // plot and actors kept for all items
  if(editingId){
    const li=sharedData.library.findIndex(x=>x.id===editingId);
    const wi=sharedData.wishlist.findIndex(x=>x.id===editingId);
    if(li>-1)sharedData.library[li]={...sharedData.library[li],...item};
    if(wi>-1)sharedData.wishlist[wi]={...sharedData.wishlist[wi],...item};
  }else{
    if(addTarget==='library'){
      sharedData.library.push(item);
      if(document.getElementById('add-wtch').checked){const me=myData();me.watched=me.watched||{};me.watched[item.id]=true;saveUsers();}
    }else{
      sharedData.wishlist.push(item);
    }
  }
  saveShared().then(()=>{closeMo('add');buildGenreFilter();if(addTarget==='library')renderLib();else renderWish();updateCounts();toast(title+(editingId?' updated!':" added!"));});
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function renderStats(){
  const me=myData();
  const watched=sharedData.library.filter(m=>me.watched?.[m.id]);
  const myRatings=Object.entries(me.ratings||{}).filter(([,v])=>v>0);
  const avg=myRatings.length?Math.round(myRatings.reduce((s,[,v])=>s+v,0)/myRatings.length*10)/10:0;
  const genreCount={};
  watched.forEach(m=>(m.genre||'').split(',').forEach(g=>{const t=g.trim();if(t)genreCount[t]=(genreCount[t]||0)+1}));
  const topGenres=Object.entries(genreCount).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxG=topGenres[0]?.[1]||1;
  const topRated=sharedData.library.filter(m=>me.ratings?.[m.id]>0).sort((a,b)=>(me.ratings[b.id]||0)-(me.ratings[a.id]||0)).slice(0,5);
  const userCards=allUsers.accounts.map(u=>{
    const ud=udataFor(u.id);
    const ur=Object.values(ud.ratings||{}).filter(v=>v>0);
    const uw=Object.values(ud.watched||{}).filter(Boolean).length;
    const ua=ur.length?Math.round(ur.reduce((s,v)=>s+v,0)/ur.length*10)/10:0;
    return `<div style="background:var(--bg3);border-radius:8px;padding:12px;text-align:center;border:1px solid var(--border)">
      ${avatarEl(u,36)}<div style="font-weight:600;font-size:13px;margin:7px 0 6px">${u.username}</div>
      <div style="font-size:11px;color:var(--muted)">Watched: <strong style="color:var(--text)">${uw}</strong></div>
      <div style="font-size:11px;color:var(--muted)">Rated: <strong style="color:var(--text)">${ur.length}</strong></div>
      <div style="font-size:11px;color:var(--muted)">Avg: <strong style="color:var(--gold)">${ua||'—'}</strong></div>
    </div>`;
  }).join('');
  document.getElementById('stats-page').innerHTML=`
    <div class="stat-block"><div class="sbt"><i class="ti ti-eye"></i> ${CU.username}'s Watch</div>
      <div class="stat-big">${watched.length}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">of ${sharedData.library.length} titles · ${sharedData.library.length-watched.length} unwatched</div></div>
    <div class="stat-block"><div class="sbt"><i class="ti ti-star"></i> ${CU.username}'s Ratings</div>
      <div class="stat-big">${avg||'—'}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${myRatings.length} titles rated</div></div>
    <div class="stat-block" style="grid-column:1/-1"><div class="sbt"><i class="ti ti-users"></i> All Members</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px">${userCards}</div></div>
    ${topGenres.length?`<div class="stat-block"><div class="sbt"><i class="ti ti-tags"></i> Top Genres Watched</div>
      <div class="gbar">${topGenres.map(([g,c])=>`<div class="gbar-row"><span class="gbar-lbl">${g}</span><div class="gbar-track"><div class="gbar-fill" style="width:${Math.round(c/maxG*100)}%"></div></div><span class="gbar-val">${c}</span></div>`).join('')}</div></div>`:''}
    ${topRated.length?`<div class="stat-block"><div class="sbt"><i class="ti ti-trophy"></i> ${CU.username}'s Top Rated</div>
      ${topRated.map((m,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="openDetail('${m.id}','library')">
        <div style="font-family:'Bebas Neue',cursive;font-size:16px;color:var(--muted);min-width:18px">${i+1}</div>
        ${m.poster&&m.poster!=='N/A'?`<img src="${m.poster}" style="width:28px;height:42px;border-radius:3px;object-fit:cover" loading="lazy">`:'<div style="width:28px;height:42px;border-radius:3px;background:var(--bg3)"></div>'}
        <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.title}</div><div style="font-size:10px;color:var(--muted)">${m.year||''}</div></div>
        <div style="font-family:'Bebas Neue',cursive;font-size:18px;color:var(--gold)">${me.ratings[m.id]}/10</div>
      </div>`).join('')}</div>`:''}`;
}

// ── RANDOM PICKER ─────────────────────────────────────────────────────────────
function openPicker(){ rollPicker(); openMo('picker'); }
function rollPicker(){
  const me=myData();
  const pool=sharedData.library.filter(m=>!me.watched?.[m.id]);
  if(!pool.length){document.getElementById('picker-body').innerHTML=`<div style="color:var(--muted);margin-bottom:18px;font-size:13px">You've watched everything! Add more titles.</div>`;return;}
  const m=pool[Math.floor(Math.random()*pool.length)];
  const hp=m.poster&&m.poster!=='N/A';
  document.getElementById('picker-body').innerHTML=`
    ${hp?`<img src="${m.poster}" class="picker-poster" onerror="this.style.display='none'">`:`<div class="picker-fb"><i class="ti ti-movie" style="font-size:42px;color:var(--muted);opacity:.3"></i></div>`}
    <div class="picker-title">${m.title}</div>
    <div class="picker-meta">${m.year||''}${m.genre?' · '+m.genre.split(',')[0]:''}${m.rating?' · '+m.rating:''}</div>
    <div style="margin-bottom:16px"><button class="act" style="margin:0 auto;display:inline-flex" onclick="closeMo('picker');openDetail('${m.id}','library')"><i class="ti ti-info-circle"></i> View Details</button></div>`;
}

// ── PROFILE ───────────────────────────────────────────────────────────────────
function openProfile(){
  document.getElementById('profile-body').innerHTML=`
    <div class="profile-header">
      ${avatarEl(CU,56)}
      <div>
        <div style="font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:1px">${CU.username}</div>
        <div class="role-tag ${isAdmin()?'rt-admin':'rt-member'}" style="display:inline-block;margin-top:4px">${isAdmin()?'Admin':'Member'}</div>
      </div>
    </div>
    <div class="profile-body">
      <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Edit Profile</div>
      <div class="ff" style="margin-bottom:10px"><label class="fl">Profile Photo URL</label>
        <input type="text" class="ffi" id="p-photo" value="${CU.photo||''}" placeholder="https://..."></div>
      <div class="ff" style="margin-bottom:12px"><label class="fl">Plex Username <span style="font-weight:400;color:var(--muted);text-transform:none;font-size:10px">(for activity tracking)</span></label>
        <input type="text" class="ffi" id="p-plex" value="${CU.plexUsername||''}" placeholder="Your Plex username"></div>

      <div class="ff" style="margin-bottom:12px"><label class="fl">Pick a Color</label>
        <div class="color-picker" id="profile-colors"></div>
      </div>
      <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Change Password</div>
      <div class="ff" style="margin-bottom:8px"><label class="fl">Current Password</label><input type="password" class="ffi" id="p-cur" placeholder="Current password"></div>
      <div class="ff" style="margin-bottom:12px"><label class="fl">New Password</label><input type="password" class="ffi" id="p-new" placeholder="New password"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
        <button class="primary-btn" onclick="saveProfile()"><i class="ti ti-device-floppy"></i> Save Changes</button>
      </div>
      ${isAdmin()?`
      <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Invite Codes</div>
      <div style="background:var(--bg3);border-radius:8px;padding:10px 12px;font-size:12px;margin-bottom:12px;border:1px solid var(--border)">
        Admin code: <code style="color:var(--gold)">${ADMIN_CODE}</code><br>
        Member code: <code style="color:var(--purple)">${MEMBER_CODE}</code><br>
        <span style="color:var(--muted);font-size:11px">Change these in the HTML file.</span>
      </div>
      <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Manage Members</div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">
        ${allUsers.accounts.map(u=>`<div style="display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:8px;padding:8px 10px;border:1px solid var(--border)">
          ${avatarEl(u,28)}<span style="flex:1;font-size:13px;font-weight:500">${u.username}</span>
          <span class="role-tag ${u.role==='admin'?'rt-admin':'rt-member'}">${u.role}</span>
          ${u.id!==CU.id?`<button onclick="removeUser('${u.id}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px" title="Remove user"><i class="ti ti-user-x"></i></button>`:''}
        </div>`).join('')}
      </div>
      <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Plex Setup</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.6">Connect your Plex server to show watch activity on titles. Token stored locally — never uploaded.</div>
      <div class="ff" style="margin-bottom:8px"><label class="fl">Plex Server URL</label>
        <input type="text" class="ffi" id="s-plex-url" value="${getPlexCfg().url||''}" placeholder="https://xxx.plex.direct:32400"></div>
      <div class="ff" style="margin-bottom:10px"><label class="fl">Plex Token</label>
        <input type="password" class="ffi" id="s-plex-tok" value="${getPlexCfg().token||''}" placeholder="Your X-Plex-Token"></div>
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        <button class="primary-btn" onclick="savePlexCfg({url:document.getElementById('s-plex-url').value.trim(),token:document.getElementById('s-plex-tok').value.trim()});plexActivity.lastFetch=0;fetchPlexActivity().then(()=>{renderLib();toast('Plex connected!');closeMo('profile');})"><i class="ti ti-plug"></i> Save & Connect</button>
        ${getPlexCfg().url?`<button class="danger-btn" onclick="savePlexCfg({});plexActivity={history:[],sessions:[],plexUsers:[],lastFetch:0};renderLib();toast('Plex disconnected');closeMo('profile')"><i class="ti ti-unlink"></i> Disconnect</button>`:''}
      </div>
      <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Cloud Status</div>
      ${(WORKER_URL&&APP_TOKEN&&cloudLoaded)?
        `<div class="connected-box">✓ Cloud connected — syncs across all devices</div>`:
        (WORKER_URL&&APP_TOKEN)?
        `<div style="font-size:12px;color:var(--orange);margin-bottom:10px;line-height:1.6;background:rgba(230,126,34,.07);border:1px solid rgba(230,126,34,.2);border-radius:8px;padding:10px 12px">⚠ Worker URL/token are set but cloud hasn't loaded yet. Check your Worker is deployed and the token matches.</div>`:
        `<div style="font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.6">Set WORKER_URL and APP_TOKEN at the top of the HTML file to enable cross-device sync.</div>`}
      `:''}
      <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;margin-top:4px">Account</div>
      <button class="ghost-btn" onclick="signOut();closeMo('profile')"><i class="ti ti-logout"></i> Sign Out</button>
    </div>`;
  signupColor=CU.color||COLORS[0];
  document.getElementById('profile-colors').innerHTML=COLORS.map(c=>`
    <div class="color-swatch ${c===signupColor?'sel':''}" style="background:${c}" onclick="pickSignupColor('${c}');document.getElementById('profile-colors').innerHTML=document.getElementById('profile-colors').innerHTML"></div>`).join('');
  openMo('profile');
}

function saveProfile(){
  const photo=document.getElementById('p-photo')?.value.trim()||'';
  const curPass=document.getElementById('p-cur')?.value;
  const newPass=document.getElementById('p-new')?.value;
  const account=allUsers.accounts.find(a=>a.id===CU.id);if(!account)return;
  const plexUser=document.getElementById('p-plex')?.value.trim()||'';
  account.photo=photo;account.color=signupColor;account.plexUsername=plexUser;
  CU.photo=photo;CU.color=signupColor;CU.plexUsername=plexUser;
  if(curPass&&newPass){
    if(account.passwordHash!==hash(curPass)){toast('Current password is wrong.',true);return;}
    if(newPass.length<4){toast('New password too short.',true);return;}
    account.passwordHash=hash(newPass);
  }
  saveUsers().then(()=>{initApp();closeMo('profile');toast('Profile updated!');});
}

function removeUser(id){
  if(!confirm('Remove this user? Their personal data will be deleted.'))return;
  allUsers.accounts=allUsers.accounts.filter(a=>a.id!==id);
  delete allUsers.personal[id];
  saveUsers().then(()=>{openProfile();toast('User removed.');});
}

    library:[

// ── INIT ───────────────────────────────────────────────────────────────────────
buildSignupColors();
loadLocal();
(async function(){
  const ok=await loadFromCloud();
  if(ok&&sharedData.library.length===0&&(!allUsers.accounts||allUsers.accounts.length===0)) seed();
  else if(!ok&&sharedData.library.length===0) seed();

  let savedId=null;
  try{savedId=localStorage.getItem('mcflix_session');}catch(e){}
  if(savedId){
    const account=allUsers.accounts.find(a=>a.id===savedId);
    if(account){
      CU={...account};
      document.getElementById('auth-screen').className='screen';
      document.getElementById('app-screen').className='screen active';
      initApp();
    }else{
      try{localStorage.removeItem('mcflix_session');}catch(e){}
    }
  }
})();

if(!WORKER_URL||!APP_TOKEN){
  console.log('%cMcFlix: cloud backend not configured. Set WORKER_URL and APP_TOKEN at the top of the script.','color:#e8b84b;font-size:13px');
}
</script>
